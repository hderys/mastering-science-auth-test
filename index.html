<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 密碼系統完整測試</title>
    <script src="https://cdn.jsdelivr.net/npm/firebase@12.15.0/firebase-app-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/firebase@12.15.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/firebase@12.15.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f0edf8; padding: 16px; }
        .container { max-width: 520px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 16px 20px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .card-title { font-weight: 700; font-size: 0.9rem; color: #2e0f5a; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .badge { font-size: 0.55rem; background: #4a1d8c; color: white; padding: 1px 10px; border-radius: 20px; font-weight: 600; }
        .badge.ok { background: #10b981; }
        .badge.fail { background: #dc2626; }
        label { display: block; font-size: 0.7rem; font-weight: 600; color: #2e0f5a; margin-bottom: 2px; }
        input { width: 100%; padding: 7px 10px; border-radius: 8px; border: 2px solid #e0d6f5; font-size: 0.85rem; outline: none; }
        input:focus { border-color: #4a1d8c; }
        .row { display: flex; gap: 6px; flex-wrap: wrap; }
        .row .btn { flex: 1; min-width: 60px; }
        .btn { padding: 7px 12px; border: none; border-radius: 40px; font-weight: 700; font-size: 0.75rem; cursor: pointer; transition: 0.2s; text-align: center; }
        .btn-p { background: #4a1d8c; color: white; }
        .btn-p:hover { background: #3b1a6e; }
        .btn-s { background: #10b981; color: white; }
        .btn-s:hover { background: #059669; }
        .btn-d { background: #dc2626; color: white; }
        .btn-d:hover { background: #b91c1c; }
        .btn-o { background: white; color: #4a1d8c; border: 2px solid #4a1d8c; }
        .btn-o:hover { background: #f5f0ff; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .alert { padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; margin-top: 6px; display: none; }
        .alert-s { background: #d4edda; color: #065f46; display: block; }
        .alert-d { background: #f8d7da; color: #7f1d1d; display: block; }
        .alert-w { background: #fef3c7; color: #7c5a00; display: block; }
        .alert-i { background: #dbeafe; color: #1e40af; display: block; }
        .mt-1 { margin-top: 6px; }
        .mt-2 { margin-top: 12px; }
        .flex { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .flex .btn { flex: 0 0 auto; }
        .status { font-size: 0.7rem; color: #666; }
        .pw { font-family: monospace; font-size: 1.1rem; background: #f0f0f0; padding: 2px 12px; border-radius: 6px; }
        .hidden { display: none !important; }
        .user-box { background: #ede9fe; border-radius: 10px; padding: 8px 12px; font-size: 0.8rem; color: #2e0f5a; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="container" id="app">
    <h1 style="color:#4a1d8c; font-size:1.2rem; text-align:center;">🧪 密碼系統完整測試</h1>
    <p style="text-align:center; font-size:0.75rem; color:#888; margin-bottom:12px;">測試帳戶：VIP001 / NewPwd123</p>

    <!-- 狀態 -->
    <div class="card" style="padding:10px 16px;">
        <div class="flex" style="justify-content:space-between;">
            <span><span id="dot" style="display:inline-block; width:10px; height:10px; border-radius:50%; background:#f59e0b;"></span> <span id="statusText">⏳ 連線中</span></span>
            <span id="userDisplay" style="font-size:0.75rem; color:#888;">未登入</span>
        </div>
    </div>

    <!-- 用戶資訊 -->
    <div id="userBox" class="hidden user-box">
        <span id="userInfo">-</span>
        <button class="btn btn-d" style="padding:2px 12px; font-size:0.65rem;" onclick="logout()">登出</button>
    </div>

    <!-- ===== 測試 1: 建立學生 ===== -->
    <div class="card">
        <div class="card-title">📝 測試 1：建立學生帳戶</div>
        <div class="row" style="gap:6px;">
            <div style="flex:2;">
                <label>姓名</label>
                <input id="regName" placeholder="測試學生" value="測試學生">
            </div>
            <div style="flex:1;">
                <label>學號 (留空自動)</label>
                <input id="regId" placeholder="自動">
            </div>
        </div>
        <div class="row" style="gap:6px;">
            <div style="flex:1;">
                <label>班級</label>
                <input id="regClass" value="VIP">
            </div>
            <div style="flex:1;">
                <label>電話</label>
                <input id="regPhone" placeholder="91234567" value="91234567">
            </div>
        </div>
        <button class="btn btn-s btn-block" onclick="testCreateUser()">✅ 建立學生</button>
        <div id="regResult" class="alert"></div>
    </div>

    <!-- ===== 測試 2: 登入 ===== -->
    <div class="card">
        <div class="card-title">🔐 測試 2：登入</div>
        <div class="row" style="gap:6px;">
            <div style="flex:1;">
                <label>學號</label>
                <input id="loginId" placeholder="VIP001" value="VIP001">
            </div>
            <div style="flex:1;">
                <label>密碼</label>
                <input id="loginPw" type="password" placeholder="密碼" value="NewPwd123">
            </div>
        </div>
        <div class="row">
            <button class="btn btn-p" onclick="testLogin()">🔒 登入</button>
            <button class="btn btn-o" onclick="testLoginFail()">❌ 測試錯誤密碼</button>
        </div>
        <div id="loginResult" class="alert"></div>
    </div>

    <!-- ===== 測試 3: 修改密碼 ===== -->
    <div class="card" id="changeSection">
        <div class="card-title">🔑 測試 3：修改密碼</div>
        <div class="row" style="gap:6px;">
            <div style="flex:1;"><label>舊密碼</label><input id="oldPw" type="password" placeholder="舊密碼"></div>
            <div style="flex:1;"><label>新密碼</label><input id="newPw" type="password" placeholder="新密碼"></div>
            <div style="flex:1;"><label>確認新密碼</label><input id="confirmPw" type="password" placeholder="再次輸入"></div>
        </div>
        <button class="btn btn-s btn-block" onclick="testChangePassword()">✅ 修改密碼</button>
        <div id="changeResult" class="alert"></div>
    </div>

    <!-- ===== 測試 4: 首次登入強制改密碼 ===== -->
    <div class="card">
        <div class="card-title">🔄 測試 4：首次登入強制改密碼</div>
        <p style="font-size:0.75rem; color:#888; margin-bottom:6px;">模擬學生首次登入，強制修改密碼</p>
        <div class="row" style="gap:6px;">
            <div style="flex:1;"><label>學號</label><input id="firstLoginId" placeholder="輸入學號"></div>
            <div style="flex:1;"><label>當前密碼</label><input id="firstLoginPw" type="password" placeholder="初始密碼"></div>
        </div>
        <div class="row" style="gap:6px;">
            <div style="flex:1;"><label>新密碼</label><input id="firstNewPw" type="password" placeholder="新密碼"></div>
            <div style="flex:1;"><label>確認新密碼</label><input id="firstConfirmPw" type="password" placeholder="再次輸入"></div>
        </div>
        <button class="btn btn-p btn-block" onclick="testFirstLoginChange()">🔄 模擬首次登入改密碼</button>
        <div id="firstChangeResult" class="alert"></div>
    </div>

    <!-- ===== 測試 5: 老師重置學生密碼 ===== -->
    <div class="card">
        <div class="card-title">🔄 測試 5：老師重置學生密碼</div>
        <p style="font-size:0.75rem; color:#888; margin-bottom:6px;">老師強制重置學生密碼（用電話驗證）</p>
        <div class="row" style="gap:6px;">
            <div style="flex:1;"><label>學生學號</label><input id="resetId" placeholder="輸入學號"></div>
            <div style="flex:1;"><label>電話號碼</label><input id="resetPhone" placeholder="電話號碼"></div>
        </div>
        <button class="btn btn-d btn-block" onclick="testResetPassword()">🔄 重置密碼</button>
        <div id="resetResult" class="alert"></div>
    </div>

    <!-- ===== 測試 6: 忘記密碼 ===== -->
    <div class="card">
        <div class="card-title">🔑 測試 6：忘記密碼（電話驗證）</div>
        <div class="row" style="gap:6px;">
            <div style="flex:1;"><label>學號</label><input id="forgotId" placeholder="輸入學號"></div>
            <div style="flex:1;"><label>電話號碼</label><input id="forgotPhone" placeholder="電話號碼"></div>
        </div>
        <button class="btn btn-o btn-block" onclick="testForgotPassword()">🔑 忘記密碼</button>
        <div id="forgotResult" class="alert"></div>
    </div>

    <!-- ===== 測試結果記錄 ===== -->
    <div class="card">
        <div class="card-title">📊 測試結果</div>
        <div id="testLog" style="font-size:0.75rem; max-height:200px; overflow-y:auto; background:#f9f7ff; padding:8px 12px; border-radius:8px; color:#333;"></div>
    </div>
</div>

<script>
// ============================================================
// Firebase 配置（用返你本身嗰個）
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyBWUr-qFjDuAbRn2ueCOA24Bx5vHhGwCzs",
    authDomain: "mastering-science.firebaseapp.com",
    projectId: "mastering-science",
    storageBucket: "mastering-science.firebasestorage.app",
    messagingSenderId: "969510026630",
    appId: "1:969510026630:web:5c0ff3ffc7b3bdc04c8007"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ============================================================
// 全域變數
// ============================================================
let currentUser = null;
let testLogs = [];

// ============================================================
// 工具函數
// ============================================================
function getUsers() {
    const raw = localStorage.getItem('ms_chem_users');
    return raw ? JSON.parse(raw) : { users: [] };
}
function saveUsers(data) { localStorage.setItem('ms_chem_users', JSON.stringify(data)); }
function findUser(id) { return getUsers().users.find(u => u.userId === id); }
function updateUser(id, data) {
    const d = getUsers();
    const idx = d.users.findIndex(u => u.userId === id);
    if (idx === -1) return null;
    d.users[idx] = { ...d.users[idx], ...data };
    saveUsers(d);
    db.collection('users').doc(id).set(d.users[idx], { merge: true }).catch(()=>{});
    return d.users[idx];
}
function genPw() {
    const c = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
    let p = '';
    for (let i = 0; i < 8; i++) p += c[Math.floor(Math.random() * c.length)];
    return p;
}
function log(msg, ok = true) {
    const time = new Date().toLocaleTimeString();
    testLogs.unshift(`[${time}] ${ok ? '✅' : '❌'} ${msg}`);
    if (testLogs.length > 50) testLogs.pop();
    document.getElementById('testLog').innerHTML = testLogs.map(l => `<div>${l}</div>`).join('');
}
function showAlert(id, type, msg) {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = 'alert';
    if (msg) {
        el.className = `alert alert-${type}`;
        el.textContent = msg;
    }
}
function updateStatus(text, ok = true) {
    document.getElementById('statusText').textContent = text;
    document.getElementById('dot').style.background = ok ? '#10b981' : '#dc2626';
}
function updateUserUI() {
    const box = document.getElementById('userBox');
    const display = document.getElementById('userDisplay');
    if (currentUser) {
        box.classList.remove('hidden');
        document.getElementById('userInfo').textContent = `👤 ${currentUser.name} (${currentUser.userId})`;
        display.textContent = `✅ ${currentUser.name}`;
    } else {
        box.classList.add('hidden');
        display.textContent = '未登入';
    }
}

// ============================================================
// 🔥 測試 1：建立學生
// ============================================================
async function testCreateUser() {
    const name = document.getElementById('regName').value.trim();
    const customId = document.getElementById('regId').value.trim() || null;
    const cls = document.getElementById('regClass').value.trim() || 'VIP';
    const phone = document.getElementById('regPhone').value.trim();
    const res = document.getElementById('regResult');
    if (!name || !phone) { showAlert('regResult', 'w', '⚠️ 請填姓名和電話'); return; }
    
    const d = getUsers();
    let userId = customId;
    if (!userId) {
        const classUsers = d.users.filter(u => u.className === cls);
        userId = String(classUsers.length + 1).padStart(6, '0');
    }
    if (findUser(userId)) { showAlert('regResult', 'd', '❌ 學號 ' + userId + ' 已被使用'); return; }
    
    const pw = genPw();
    const user = { userId, name, className: cls, phone, initialPassword: pw, password: null, isFirstLogin: true, isTeacher: false, managedClasses: [cls], createdAt: new Date().toISOString() };
    
    try {
        d.users.push(user);
        saveUsers(d);
        await db.collection('users').doc(userId).set(user, { merge: true });
        const email = userId + '@mastering-science.com';
        try { await auth.createUserWithEmailAndPassword(email, pw); } 
        catch(e) { if (e.code !== 'auth/email-already-in-use') throw e; }
        
        showAlert('regResult', 's', `✅ 建立成功！學號：${userId}，密碼：${pw}`);
        log(`建立學生 ${name} (${userId}) 成功，密碼：${pw}`);
        document.getElementById('regName').value = '';
        document.getElementById('regId').value = '';
        document.getElementById('regPhone').value = '';
    } catch(e) {
        showAlert('regResult', 'd', '❌ 建立失敗：' + e.message);
        log(`建立學生失敗：${e.message}`, false);
        // 回滾
        const d2 = getUsers();
        d2.users = d2.users.filter(u => u.userId !== userId);
        saveUsers(d2);
    }
}

// ============================================================
// 🔥 測試 2：登入
// ============================================================
async function testLogin() {
    const id = document.getElementById('loginId').value.trim();
    const pw = document.getElementById('loginPw').value;
    const res = document.getElementById('loginResult');
    if (!id || !pw) { showAlert('loginResult', 'w', '⚠️ 請輸入學號和密碼'); return; }
    
    try {
        updateStatus('⏳ 登入中...', false);
        const email = id + '@mastering-science.com';
        await auth.signInWithEmailAndPassword(email, pw);
        let user = findUser(id);
        if (!user) {
            const doc = await db.collection('users').doc(id).get();
            if (doc.exists) user = doc.data();
        }
        if (!user) { showAlert('loginResult', 'd', '❌ 找不到用戶資料'); await auth.signOut(); return; }
        currentUser = user;
        updateUserUI();
        showAlert('loginResult', 's', `✅ 登入成功！歡迎 ${user.name}`);
        log(`登入成功：${id}`);
        updateStatus(`✅ 已登入 ${user.name}`, true);
    } catch(e) {
        const msg = e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential' ? '❌ 密碼錯誤' :
                    e.code === 'auth/user-not-found' ? '❌ 帳戶不存在' : '❌ ' + e.message;
        showAlert('loginResult', 'd', msg);
        log(`登入失敗：${id} - ${msg}`, false);
        updateStatus('❌ 登入失敗', false);
    }
}

async function testLoginFail() {
    document.getElementById('loginPw').value = 'WrongPassword123';
    await testLogin();
    document.getElementById('loginPw').value = 'NewPwd123';
}

// ============================================================
// 🔥 測試 3：修改密碼
// ============================================================
async function testChangePassword() {
    const oldPw = document.getElementById('oldPw').value;
    const newPw = document.getElementById('newPw').value;
    const confirmPw = document.getElementById('confirmPw').value;
    const res = document.getElementById('changeResult');
    if (!currentUser) { showAlert('changeResult', 'w', '⚠️ 請先登入'); return; }
    if (newPw.length < 6) { showAlert('changeResult', 'w', '⚠️ 密碼至少6個字元'); return; }
    if (newPw !== confirmPw) { showAlert('changeResult', 'w', '❌ 兩次密碼不一致'); return; }
    
    const userId = currentUser.userId || currentUser.id;
    const validOld = currentUser.password || currentUser.initialPassword;
    if (oldPw !== validOld) { showAlert('changeResult', 'w', '❌ 舊密碼不正確'); return; }
    
    try {
        updateUser(userId, { password: newPw, isFirstLogin: false });
        currentUser = findUser(userId);
        const fbUser = auth.currentUser;
        if (fbUser) {
            await fbUser.updatePassword(newPw);
        } else {
            const email = userId + '@mastering-science.com';
            const cred = await auth.signInWithEmailAndPassword(email, oldPw);
            await cred.user.updatePassword(newPw);
        }
        showAlert('changeResult', 's', '✅ 密碼已修改！請用新密碼登入測試');
        log(`修改密碼成功：${userId}`);
        document.getElementById('oldPw').value = '';
        document.getElementById('newPw').value = '';
        document.getElementById('confirmPw').value = '';
    } catch(e) {
        showAlert('changeResult', 'd', '❌ 修改失敗：' + e.message);
        log(`修改密碼失敗：${e.message}`, false);
    }
}

// ============================================================
// 🔥 測試 4：首次登入強制改密碼
// ============================================================
async function testFirstLoginChange() {
    const id = document.getElementById('firstLoginId').value.trim();
    const oldPw = document.getElementById('firstLoginPw').value;
    const newPw = document.getElementById('firstNewPw').value;
    const confirmPw = document.getElementById('firstConfirmPw').value;
    const res = document.getElementById('firstChangeResult');
    if (!id || !oldPw) { showAlert('firstChangeResult', 'w', '⚠️ 請輸入學號和當前密碼'); return; }
    if (newPw.length < 6) { showAlert('firstChangeResult', 'w', '⚠️ 新密碼至少6個字元'); return; }
    if (newPw !== confirmPw) { showAlert('firstChangeResult', 'w', '❌ 兩次密碼不一致'); return; }
    
    try {
        // 先用舊密碼登入（模擬首次登入）
        const email = id + '@mastering-science.com';
        const cred = await auth.signInWithEmailAndPassword(email, oldPw);
        // 立即改密碼
        await cred.user.updatePassword(newPw);
        // 更新 localStorage
        const user = findUser(id);
        if (user) updateUser(id, { password: newPw, isFirstLogin: false });
        // 登出
        await auth.signOut();
        currentUser = null;
        updateUserUI();
        showAlert('firstChangeResult', 's', `✅ 首次登入改密碼成功！請用新密碼登入測試`);
        log(`首次登入改密碼成功：${id}`);
        document.getElementById('firstLoginId').value = '';
        document.getElementById('firstLoginPw').value = '';
        document.getElementById('firstNewPw').value = '';
        document.getElementById('firstConfirmPw').value = '';
    } catch(e) {
        showAlert('firstChangeResult', 'd', '❌ 失敗：' + e.message);
        log(`首次登入改密碼失敗：${e.message}`, false);
    }
}

// ============================================================
// 🔥 測試 5：老師重置學生密碼
// ============================================================
async function testResetPassword() {
    const id = document.getElementById('resetId').value.trim();
    const phone = document.getElementById('resetPhone').value.trim();
    const res = document.getElementById('resetResult');
    if (!id || !phone) { showAlert('resetResult', 'w', '⚠️ 請輸入學號和電話'); return; }
    
    const user = findUser(id);
    if (!user) { showAlert('resetResult', 'd', '❌ 學號不存在'); return; }
    if (user.phone !== phone) { showAlert('resetResult', 'd', '❌ 電話號碼不正確'); return; }
    
    const newPw = genPw();
    try {
        updateUser(id, { initialPassword: newPw, password: null, isFirstLogin: true });
        const email = id + '@mastering-science.com';
        const fbUser = auth.currentUser;
        if (fbUser) {
            await fbUser.updatePassword(newPw);
        } else {
            const oldPw = user.password || user.initialPassword;
            try {
                const cred = await auth.signInWithEmailAndPassword(email, oldPw);
                await cred.user.updatePassword(newPw);
            } catch(e) {
                await auth.createUserWithEmailAndPassword(email, newPw);
            }
        }
        showAlert('resetResult', 's', `✅ 重置成功！新密碼：${newPw}`);
        log(`重置密碼成功：${id}，新密碼：${newPw}`);
        document.getElementById('resetId').value = '';
        document.getElementById('resetPhone').value = '';
    } catch(e) {
        showAlert('resetResult', 'd', '❌ 重置失敗：' + e.message);
        log(`重置密碼失敗：${e.message}`, false);
    }
}

// ============================================================
// 🔥 測試 6：忘記密碼
// ============================================================
async function testForgotPassword() {
    const id = document.getElementById('forgotId').value.trim();
    const phone = document.getElementById('forgotPhone').value.trim();
    const res = document.getElementById('forgotResult');
    if (!id || !phone) { showAlert('forgotResult', 'w', '⚠️ 請輸入學號和電話'); return; }
    
    const user = findUser(id);
    if (!user) { showAlert('forgotResult', 'd', '❌ 學號不存在'); return; }
    if (user.phone !== phone) { showAlert('forgotResult', 'd', '❌ 電話號碼不正確'); return; }
    
    const newPw = genPw();
    try {
        updateUser(id, { initialPassword: newPw, password: null, isFirstLogin: true });
        const email = id + '@mastering-science.com';
        const fbUser = auth.currentUser;
        if (fbUser) {
            await fbUser.updatePassword(newPw);
        } else {
            const oldPw = user.password || user.initialPassword;
            try {
                const cred = await auth.signInWithEmailAndPassword(email, oldPw);
                await cred.user.updatePassword(newPw);
            } catch(e) {
                await auth.createUserWithEmailAndPassword(email, newPw);
            }
        }
        showAlert('forgotResult', 's', `✅ 密碼已重設！新密碼：${newPw}`);
        log(`忘記密碼重設成功：${id}，新密碼：${newPw}`);
        document.getElementById('forgotId').value = '';
        document.getElementById('forgotPhone').value = '';
    } catch(e) {
        showAlert('forgotResult', 'd', '❌ 重設失敗：' + e.message);
        log(`忘記密碼重設失敗：${e.message}`, false);
    }
}

// ============================================================
// 🚪 登出
// ============================================================
function logout() {
    auth.signOut();
    currentUser = null;
    updateUserUI();
    updateStatus('⏳ 已登出', false);
    log('已登出');
}

// ============================================================
// 🔥 Auth 狀態監聽
// ============================================================
auth.onAuthStateChanged(user => {
    if (user && !currentUser) {
        const email = user.email;
        if (email && email.endsWith('@mastering-science.com')) {
            const id = email.replace('@mastering-science.com', '');
            const found = findUser(id);
            if (found) { currentUser = found; updateUserUI(); }
        }
    }
});

updateStatus('⏳ 就緒', false);
log('🧪 測試頁面已載入，用 VIP001 / NewPwd123 測試');
document.getElementById('loginId').value = 'VIP001';
document.getElementById('loginPw').value = 'NewPwd123';
</script>
