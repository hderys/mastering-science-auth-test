<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>測試 - 直置橫置切換 + 全屏</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===== 基礎 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f0ff;
            font-family: system-ui, sans-serif;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn {
            border: none;
            background: #4a1d8c;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .btn:hover { background: #3b1a6e; }
        .btn-outline {
            background: white;
            color: #4a1d8c;
            border: 1px solid #4a1d8c;
        }
        .btn-outline:hover { background: #f5f0ff; }

        /* ===== 測試入口 ===== */
        #testEntry {
            text-align: center;
        }
        #testEntry p {
            color: #666;
            margin: 8px 0 16px 0;
            font-size: 0.9rem;
        }
        .device-hint {
            display: inline-block;
            background: #e9e4f5;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #4a1d8c;
            margin-top: 12px;
        }

        /* ===== 問題彈窗 ===== */
        #quizModal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #quizModal.show { display: flex; }

        #quizModal .modal-content {
            background: white;
            width: 95%;
            max-width: 1000px;
            height: 90vh;
            max-height: 700px;
            border-radius: 28px;
            padding: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* ===== 關閉按鈕（任何模式都顯示） ===== */
        .close-test-btn {
            position: absolute;
            top: 10px;
            right: 14px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            font-size: 1.2rem;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .close-test-btn:hover {
            background: rgba(0,0,0,0.7);
        }

        /* ===== 手機版標題（直置時顯示） ===== */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px 6px 16px;
            flex-shrink: 0;
            background: white;
            border-bottom: 1px solid #f0edf8;
        }
        .quiz-header #quizDifficulty {
            font-size: 0.85rem;
            font-weight: 600;
            color: #2e0f5a;
        }
        .quiz-header #quizCounter {
            font-size: 0.85rem;
            color: #888;
        }
        .quiz-header .quiz-timer {
            font-size: 0.9rem;
            font-weight: 600;
            color: #dc2626;
        }

        /* ===== 手機版導航圈圈（直置時顯示） ===== */
        .question-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 6px 16px;
            justify-content: center;
            flex-shrink: 0;
            background: white;
            border-bottom: 1px solid #f0edf8;
        }
        .q-nav-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            font-size: 0.65rem;
            cursor: pointer;
            background: #e9e4f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        .q-nav-btn.current { background: #4a1d8c; color: white; }
        .q-nav-btn.answered { background: #10b981; color: white; }
        .q-nav-btn.unanswered { background: #fbbf24; }

        /* ===== 題目區域（永遠顯示，不分直置橫置） ===== */
        .question-area {
            flex: 1;
            padding: 16px 20px 10px 20px;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
            background: white;
        }
        .question-text {
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.5;
            color: #1a1a2e;
            margin-bottom: 10px;
            flex-shrink: 0;
            word-break: break-word;
        }
        .image-area {
            text-align: center;
            margin-bottom: 10px;
            flex-shrink: 0;
            min-height: 20px;
        }
        .image-area img {
            max-height: 110px;
            max-width: 100%;
            object-fit: contain;
            border-radius: 8px;
            border: 1px solid #e9e4f5;
            padding: 4px;
        }
        .image-area:not(:has(img)) { display: none; }

        /* ===== 選項（永遠顯示） ===== */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            flex: 1;
            align-content: flex-start;
            min-height: 0;
        }
        .option-btn {
            background: #faf8ff;
            border: 2px solid #e0d6f5;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e1b4b;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            min-height: 44px;
        }
        .option-btn:hover { border-color: #4a1d8c; background: #f5f0ff; }
        .option-btn.selected {
            border-color: #4a1d8c;
            background: #4a1d8c;
            color: white;
        }

        /* ===== 手機版底部按鈕（直置時顯示） ===== */
        .quiz-footer {
            display: flex;
            gap: 6px;
            padding: 8px 16px 12px 16px;
            flex-shrink: 0;
            background: white;
            border-top: 1px solid #f0edf8;
        }
        .quiz-footer .btn {
            flex: 1;
            padding: 8px 4px;
            font-size: 0.75rem;
            text-align: center;
            border-radius: 30px;
        }
        #submitAllBtn {
            background: #10b981;
            color: white;
        }

        /* ===== 桌面版側邊欄（橫置時顯示） ===== */
        .sidebar {
            display: none;
            width: 200px;
            min-width: 160px;
            background: linear-gradient(145deg, #3b1a6e, #2d0f54);
            padding: 16px 12px;
            flex-direction: column;
            flex-shrink: 0;
            border-left: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-row-1 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            flex-shrink: 0;
        }
        .sidebar-row-1 .difficulty {
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
        }
        .sidebar-row-1 .timer {
            font-size: 13px;
            font-weight: 600;
            color: #fca5a5;
        }
        .sidebar-row-2 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            flex-shrink: 0;
        }
        .sidebar-row-2 .table-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 3px 12px;
            font-size: 11px;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
        }
        .sidebar-row-2 .counter {
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
        }

        .nav-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            padding: 10px 0 8px 0;
            flex: 1;
            align-content: flex-start;
            min-height: 0;
            overflow-y: auto;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            margin-bottom: 8px;
        }
        .nav-dot {
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: none;
            font-weight: 600;
            color: #c4b5d4;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            width: 24px;
            height: 24px;
            font-size: 9px;
        }
        .nav-dot.current {
            background: #8b5cf6;
            color: white;
            box-shadow: 0 0 12px rgba(139,92,246,0.4);
        }
        .nav-dot.answered {
            background: #34d399;
            color: white;
        }
        .nav-dot.unanswered {
            background: #fbbf24;
            color: #7c5a00;
        }

        .sidebar-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        .sidebar-actions .btn {
            flex: 1;
            padding: 6px 4px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            text-align: center;
            min-height: 28px;
        }
        .btn-prev { background: #ffffff; color: #4a1d8c; }
        .btn-next { background: #ffffff; color: #4a1d8c; }
        .btn-submit { background: #10b981; color: white; font-size: 12px; font-weight: 700; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ============================================================
           橫置模式：變身桌面版
           ============================================================ */
        @media (max-width: 900px) and (orientation: landscape) {
            #quizModal .modal-content {
                flex-direction: row !important;
                height: 100vh !important;
                max-height: 100vh !important;
                width: 100% !important;
                max-width: 100% !important;
                border-radius: 0 !important;
                background: white;
            }

            /* 隱藏手機版元素 */
            .quiz-header { display: none !important; }
            .question-nav { display: none !important; }
            .quiz-footer { display: none !important; }

            /* 題目區域佔左邊 */
            .question-area {
                flex: 1;
                padding: 20px 24px 16px 24px;
                min-height: 0;
            }
            .question-text {
                font-size: 1.2rem !important;
                margin-bottom: 12px;
            }
            .image-area img {
                max-height: 120px !important;
            }
            .options-grid {
                grid-template-columns: 1fr 1fr !important;
                gap: 10px !important;
                flex: 1;
                align-content: center;
            }
            .option-btn {
                padding: 14px 18px !important;
                font-size: 1rem !important;
                min-height: 48px !important;
            }

            /* 顯示側邊欄 */
            .sidebar {
                display: flex !important;
                width: 200px;
                min-width: 160px;
            }
        }

        /* ============================================================
           直置模式：手機版
           ============================================================ */
        @media (max-width: 900px) and (orientation: portrait) {
            #quizModal .modal-content {
                flex-direction: column !important;
                height: 90vh !important;
                max-height: 700px !important;
                border-radius: 28px !important;
                width: 95% !important;
                max-width: 500px !important;
            }

            /* 顯示手機版元素 */
            .quiz-header { display: flex !important; }
            .question-nav { display: flex !important; }
            .quiz-footer { display: flex !important; }

            /* 隱藏側邊欄 */
            .sidebar { display: none !important; }

            /* 題目區域 */
            .question-area {
                padding: 12px 16px 8px 16px;
            }
            .question-text {
                font-size: 1rem !important;
            }
            .image-area img {
                max-height: 100px !important;
            }
            .options-grid {
                grid-template-columns: 1fr 1fr !important;
                gap: 8px !important;
                align-content: flex-start;
            }
            .option-btn {
                padding: 10px 12px !important;
                font-size: 0.85rem !important;
                min-height: 40px !important;
            }
        }

        /* ============================================================
           桌面版（>900px）：永遠顯示桌面版
           ============================================================ */
        @media (min-width: 901px) {
            .quiz-header { display: none !important; }
            .question-nav { display: none !important; }
            .quiz-footer { display: none !important; }
            .sidebar { display: flex !important; }

            #quizModal .modal-content {
                flex-direction: row !important;
                height: 620px !important;
                max-height: 90vh !important;
                border-radius: 28px !important;
                width: 95% !important;
                max-width: 1000px !important;
            }
            .question-area {
                padding: 24px 28px 20px 28px;
            }
            .question-text {
                font-size: 1.2rem !important;
            }
            .options-grid {
                grid-template-columns: 1fr 1fr !important;
                gap: 12px !important;
                align-content: center;
            }
            .option-btn {
                padding: 16px 20px !important;
                font-size: 1rem !important;
                min-height: 48px !important;
            }
            .sidebar {
                width: 210px;
                min-width: 170px;
            }
        }

        /* ===== 全屏模式 ===== */
        #quizModal:-webkit-full-screen .modal-content {
            border-radius: 0 !important;
            height: 100vh !important;
            max-height: 100vh !important;
            width: 100% !important;
            max-width: 100% !important;
        }
        #quizModal:fullscreen .modal-content {
            border-radius: 0 !important;
            height: 100vh !important;
            max-height: 100vh !important;
            width: 100% !important;
            max-width: 100% !important;
        }
        /* 全屏時橫置側邊欄維持 */
        #quizModal:-webkit-full-screen .sidebar { display: flex !important; }
        #quizModal:fullscreen .sidebar { display: flex !important; }

        /* 全屏按鈕提示 */
        .fullscreen-hint {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 0.65rem;
            padding: 4px 14px;
            border-radius: 20px;
            z-index: 15;
            opacity: 0.7;
            pointer-events: none;
            white-space: nowrap;
        }
        @media (orientation: landscape) and (max-width: 900px) {
            .fullscreen-hint { display: block; }
        }
        @media (orientation: portrait) {
            .fullscreen-hint { display: none; }
        }
        @media (min-width: 901px) {
            .fullscreen-hint { display: none; }
        }
        /* 全屏後隱藏提示 */
        #quizModal:-webkit-full-screen .fullscreen-hint { display: none !important; }
        #quizModal:fullscreen .fullscreen-hint { display: none !important; }

        /* ===== 結果彈窗 ===== */
        #resultModal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        #resultModal.show { display: flex; }
        #resultModal .modal-content {
            background: white;
            border-radius: 24px;
            padding: 24px 32px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        #resultModal h3 { color: #2e0f5a; margin-bottom: 12px; }
        #resultModal p { color: #666; margin-bottom: 16px; }
    </style>
</head>
<body>

<!-- ===== 測試入口 ===== -->
<div id="testEntry">
    <h2 style="color: #2e0f5a;">🧪 直置 ↔ 橫置 測試</h2>
    <p>點擊「開始測試」進入練習<br>然後旋轉手機測試切換效果</p>
    <button class="btn" id="startTestBtn">🚀 開始測試</button>
    <div class="device-hint">📱 手機直置 → 手機版 ｜ 橫置 → 桌面版 + 自動全屏</div>
</div>

<!-- ===== 問題彈窗 ===== -->
<div id="quizModal">
    <div class="modal-content">

        <!-- 關閉按鈕 -->
        <button class="close-test-btn" id="closeTestBtn">✕</button>

        <!-- 全屏提示 -->
        <div class="fullscreen-hint">🔍 已進入全屏模式</div>

        <!-- ===== 手機版標題（直置時顯示） ===== -->
        <div class="quiz-header">
            <span id="quizDifficulty">✅ Basic</span>
            <span id="quizCounter">1 / 3</span>
            <span id="timerDisplay" class="quiz-timer">00:00</span>
        </div>

        <!-- ===== 手機版導航圈圈（直置時顯示） ===== -->
        <div id="questionNav" class="question-nav">
            <button class="q-nav-btn current">1</button>
            <button class="q-nav-btn unanswered">2</button>
            <button class="q-nav-btn unanswered">3</button>
        </div>

        <!-- ===== 題目區域（永遠顯示） ===== -->
        <div class="question-area">
            <div id="modalQuestionText" class="question-text">載入中...</div>
            <div id="modalImageArea" class="image-area"></div>
            <div id="modalOptions" class="options-grid"></div>
        </div>

        <!-- ===== 手機版底部按鈕（直置時顯示） ===== -->
        <div class="quiz-footer">
            <button id="prevBtn" class="btn btn-outline">◀ 上一題</button>
            <button id="nextBtn" class="btn btn-outline">下一題 ▶</button>
            <button id="submitAllBtn" class="btn">提交並離開</button>
        </div>

        <!-- ===== 桌面版側邊欄（橫置時顯示） ===== -->
        <div class="sidebar" id="desktopSidebar">
            <div class="sidebar-row-1">
                <span class="difficulty" id="desktopDifficulty">✅ Basic</span>
                <span class="timer" id="desktopTimer">⏱️ 00:00</span>
            </div>
            <div class="sidebar-row-2">
                <button class="table-btn" id="desktopPeriodicBtn">📊 周期表</button>
                <span class="counter" id="desktopCounter">1 / 3</span>
            </div>
            <div class="nav-grid" id="desktopNav">
                <button class="nav-dot current">1</button>
                <button class="nav-dot unanswered">2</button>
                <button class="nav-dot unanswered">3</button>
            </div>
            <div class="sidebar-actions">
                <button class="btn btn-prev" id="desktopPrevBtn">◀</button>
                <button class="btn btn-next" id="desktopNextBtn">▶</button>
                <button class="btn btn-submit" id="desktopSubmitBtn">提交並離開</button>
            </div>
        </div>

    </div>
</div>

<!-- ===== 結果彈窗（簡化） ===== -->
<div id="resultModal">
    <div class="modal-content">
        <h3>✅ 已提交</h3>
        <p id="resultText">測試完成</p>
        <button class="btn" id="closeResultBtn" style="width:auto; padding:8px 30px;">關閉</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
