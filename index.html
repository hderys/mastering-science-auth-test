<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 密碼系統測試</title>
    <script src="https://cdn.jsdelivr.net/npm/firebase@12.15.0/firebase-app-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/firebase@12.15.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/firebase@12.15.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container { width: 100%; max-width: 560px; padding: 20px; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 24px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: #4a1d8c;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 14px;
        }
        .login-title { font-size: 1.6rem; font-weight: 700; color: #1a1a2e; text-align: center; }
        .login-sub { text-align: center; color: #888; font-size: 0.85rem; margin-top: 4px; margin-bottom: 24px; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 600; color: #333; margin-bottom: 3px; }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e8ecf1;
            border-radius: 12px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            background: #fafbfc;
        }
        .form-group input:focus { border-color: #4a1d8c; background: white; }
        
        .pw-wrapper {
            position: relative;
        }
        .pw-wrapper input { padding-right: 44px; }
        .pw-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: #888;
            padding: 4px;
        }
        .pw-toggle:hover { color: #4a1d8c; }
        
        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .btn-block { width: 100%; padding: 10px; font-size: 0.85rem; }
        .btn-primary { background: #4a1d8c; color: white; }
        .btn-primary:hover { background: #3b1a6e; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-outline { background: white; color: #4a1d8c; border: 2px solid #4a1d8c; }
        .btn-outline:hover { background: #f5f0ff; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-warning:hover { background: #d97706; }
        .btn-sm { padding: 4px 10px; font-size: 0.6rem; }
        
        .text-center { text-align: center; }
        .mt-1 { margin-top: 6px; }
        .mt-2 { margin-top: 12px; }
        .flex { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .flex .btn { flex: 1; }
        .hidden { display: none !important; }
        
        .alert {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-top: 8px;
        }
        .alert-success { background: #d1fae5; color: #065f46; }
        .alert-danger { background: #fee2e2; color: #7f1d1d; }
        .alert-warning { background: #fef3c7; color: #7c5a00; }
        .alert-info { background: #dbeafe; color: #1e40af; }
        
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0 12px 0;
            border-bottom: 1px solid #f0edf8;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .topbar .user { font-weight: 600; font-size: 0.85rem; color: #1a1a2e; }
        .topbar .user span { color: #888; font-weight: 400; }
        .topbar .badge {
            font-size: 0.6rem;
            background: #4a1d8c;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
        }
        
        .student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0edf8;
            flex-wrap: wrap;
            gap: 6px;
        }
        .student-item:last-child { border-bottom: none; }
        .student-item .info { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .student-item .name { font-weight: 500; font-size: 0.85rem; }
        .student-item .id { font-size: 0.7rem; color: #888; }
        .student-item .status {
            font-size: 0.55rem;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .status-pending { background: #fef3c7; color: #7c5a00; }
        .status-done { background: #d1fae5; color: #065f46; }
        .student-item .actions { display: flex; gap: 4px; flex-wrap: wrap; }
        .empty-state { text-align: center; color: #999; font-size: 0.8rem; padding: 20px 0; }
        
        .pw-display {
            font-family: monospace;
            font-size: 1.1rem;
            background: #f0edf8;
            padding: 4px 14px;
            border-radius: 8px;
            display: inline-block;
            letter-spacing: 1px;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .dot.online { background: #10b981; }
        .dot.offline { background: #dc2626; }
        .dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        /* 角色專區 */
        .role-zone { display: none; }
        .role-zone.visible { display: block; }
        
        @media (max-width: 480px) {
            .container { padding: 12px; }
            .card { padding: 16px 14px; }
            .student-item { flex-direction: column; align-items: stretch; }
            .student-item .actions { justify-content: flex-start; }
        }
    </style>
</head>
<body>

<div class="container" id="app">

    <!-- ===== 登入畫面 ===== -->
    <div id="loginPage">
        <div class="card">
            <div class="login-title">🧪 Mastering Science</div>
            <div class="login-sub">密碼系統測試版</div>
            <div id="loginAlert"></div>
            <div class="form-group">
                <label>登入 ID（學號）</label>
                <input type="text" id="loginId" placeholder="例如：VIP001" value="VIP001">
            </div>
            <div class="form-group">
                <label>密碼</label>
                <div class="pw-wrapper">
                    <input type="password" id="loginPw" placeholder="請輸入密碼" value="NewPwd123">
                    <button type="button" class="pw-toggle" onclick="togglePw('loginPw', this)">👁️</button>
                </div>
            </div>
            <button class="btn btn-primary btn-block" id="loginBtn">🔒 登入</button>
            <div class="text-center mt-2">
                <button class="btn btn-outline btn-sm" id="forgotBtn">🔑 忘記密碼？</button>
            </div>
            <div class="text-center mt-2">
                <span style="font-size:0.65rem; color:#bbb;">測試帳號：VIP001 / NewPwd123</span>
            </div>
        </div>
        
        <!-- 忘記密碼 -->
        <div id="forgotSection" class="card hidden">
            <div class="card-title">🔑 忘記密碼</div>
            <div id="forgotAlert"></div>
            <div class="form-group">
                <label>學號</label>
                <input type="text" id="forgotId" placeholder="輸入學號">
            </div>
            <div class="form-group">
                <label>電話號碼</label>
                <input type="text" id="forgotPhone" placeholder="例如：91234567">
            </div>
            <div class="flex">
                <button class="btn btn-outline" id="forgotCancel">取消</button>
                <button class="btn btn-primary" id="forgotSubmit">驗證並重設</button>
            </div>
        </div>
    </div>

    <!-- ===== 主畫面 ===== -->
    <div id="mainPage" class="hidden">
        
        <div class="topbar">
            <div class="user">👤 <span id="userName">-</span> <span id="userId">-</span></div>
            <div>
                <span id="userRole" class="badge">學生</span>
                <button class="btn btn-danger btn-sm" onclick="logout()" style="margin-left:8px;">登出</button>
            </div>
        </div>

        <!-- ========================================================= -->
        <!-- 🧑‍🏫 老師專區 -->
        <!-- ========================================================= -->
        <div id="teacherZone" class="role-zone">
            <div class="card">
                <div class="card-title">📝 建立學生</div>
                <div id="createAlert"></div>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="regName" placeholder="輸入姓名" value="測試學生">
                </div>
                <div class="form-group">
                    <label>班級</label>
                    <input type="text" id="regClass" placeholder="班級" value="VIP">
                </div>
                <div class="form-group">
                    <label>電話號碼</label>
                    <input type="text" id="regPhone" placeholder="電話號碼" value="91234567">
                </div>
                <div class="form-group">
                    <label>學號（留空自動產生）</label>
                    <input type="text" id="regId" placeholder="留空自動產生">
                </div>
                <button class="btn btn-success btn-block" id="createBtn">✅ 建立學生</button>
            </div>
            
            <div class="card">
                <div class="card-title">👨‍🎓 學生列表 <span id="classDisplay" style="font-weight:400; color:#888;">(VIP)</span></div>
                <div id="studentList"><div class="empty-state">載入中...</div></div>
            </div>
        </div>

        <!-- ========================================================= -->
        <!-- 🧑‍🎓 學生專區 -->
        <!-- ========================================================= -->
        <div id="studentZone" class="role-zone">
            
            <!-- 首次登入警告 -->
            <div id="firstLoginWarning" class="card hidden" style="border:2px solid #f59e0b;">
                <div style="font-size:0.9rem; font-weight:600; color:#7c5a00;">⚠️ 首次登入！請設定您的密碼</div>
                <div style="font-size:0.75rem; color:#888; margin:4px 0 12px 0;">這是您第一次登入，請設定自己的密碼。</div>
                <div id="firstLoginAlert"></div>
                <div class="form-group">
                    <label>新密碼（至少 6 個字元）</label>
                    <div class="pw-wrapper">
                        <input type="password" id="firstNewPw" placeholder="請輸入新密碼">
                        <button type="button" class="pw-toggle" onclick="togglePw('firstNewPw', this)">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>確認新密碼</label>
                    <div class="pw-wrapper">
                        <input type="password" id="firstConfirmPw" placeholder="請再次輸入新密碼">
                        <button type="button" class="pw-toggle" onclick="togglePw('firstConfirmPw', this)">👁️</button>
                    </div>
                </div>
                <button class="btn btn-success btn-block" id="firstChangeBtn">✅ 設定密碼</button>
            </div>
            
            <!-- 一般修改密碼 -->
            <div class="card">
                <div class="card-title">🔑 修改密碼</div>
                <div id="changeAlert"></div>
                <div class="form-group">
                    <label>舊密碼</label>
                    <div class="pw-wrapper">
                        <input type="password" id="changeOldPw" placeholder="請輸入舊密碼">
                        <button type="button" class="pw-toggle" onclick="togglePw('changeOldPw', this)">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>新密碼（至少 6 個字元）</label>
                    <div class="pw-wrapper">
                        <input type="password" id="changeNewPw" placeholder="請輸入新密碼">
                        <button type="button" class="pw-toggle" onclick="togglePw('changeNewPw', this)">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>確認新密碼</label>
                    <div class="pw-wrapper">
                        <input type="password" id="changeConfirmPw" placeholder="請再次輸入新密碼">
                        <button type="button" class="pw-toggle" onclick="togglePw('changeConfirmPw', this)">👁️</button>
                    </div>
                </div>
                <button class="btn btn-success btn-block" id="changeBtn">✅ 修改密碼</button>
            </div>
            
            <!-- 學生訊息 -->
            <div class="card" style="background:#f5f0ff; border:1px solid #e0d6f5;">
                <div style="font-size:0.8rem; color:#4a1d8c; text-align:center;">
                    📚 練習功能將在正式版提供<br>
                    <span style="font-size:0.7rem; color:#888;">目前專注測試密碼系統</span>
                </div>
            </div>
        </div>
        
        <div style="text-align:center; font-size:0.65rem; color:#ccc; padding:8px 0;">
            <span id="statusText">⏳ 連線中</span>
        </div>
    </div>
</div>

<script>
// ============================================================
// Firebase 配置
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyBWUr-qFjDuAbRn2ueCOA24Bx5vHhGwCzs",
    authDomain: "mastering-science.firebaseapp.com",
    projectId: "mastering-science",
    storageBucket: "mastering-science.firebasestorage.app",
    messagingSenderId: "969510026630",
    appId: "1:969510026630:web:5c0ff3ffc7b3bdc04c8007"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ============================================================
// 全域變數
// ============================================================
let currentUser = null;
let currentClass = 'VIP';
let allStudents = [];

// ============================================================
// 👁️ 眼仔功能
// ============================================================
function togglePw(inputId, btn) {
    const input = document.getElementById(inputId);
    if (!input) return;
    if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
    } else {
        input.type = 'password';
        btn.textContent = '👁️';
    }
}

// ============================================================
// 🛠️ 工具函數
// ============================================================
function genPw() {
    const c = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
    let p = '';
    for (let i = 0; i < 8; i++) p += c[Math.floor(Math.random() * c.length)];
    return p;
}

function showAlert(id, type, msg) {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = 'alert';
    if (msg) {
        el.className = `alert alert-${type}`;
        el.textContent = msg;
        el.style.display = 'block';
    } else {
        el.style.display = 'none';
    }
}
function clearAlert(id) { showAlert(id, null, ''); }

// ============================================================
// 🔥 Firestore 操作
// ============================================================
async function findUserInFirestore(userId) {
    try {
        const doc = await db.collection('users').doc(userId).get();
        if (doc.exists) return doc.data();
        return null;
    } catch(e) {
        console.warn('⚠️ Firestore 讀取失敗:', e);
        return null;
    }
}

async function updateUserInFirestore(userId, data) {
    try {
        await db.collection('users').doc(userId).set(data, { merge: true });
        return true;
    } catch(e) {
        console.warn('⚠️ Firestore 更新失敗:', e);
        return false;
    }
}

async function loadStudentsFromFirestore(className) {
    try {
        const snap = await db.collection('users')
            .where('className', '==', className)
            .where('isTeacher', '==', false)
            .get();
        const students = [];
        snap.forEach(doc => students.push(doc.data()));
        return students;
    } catch(e) {
        console.warn('⚠️ 讀取學生列表失敗:', e);
        return [];
    }
}

// ============================================================
// 🔐 登入
// ============================================================
async function doLogin(id, pw) {
    try {
        const email = id + '@mastering-science.com';
        await auth.signInWithEmailAndPassword(email, pw);
        const user = await findUserInFirestore(id);
        if (!user) {
            await auth.signOut();
            showAlert('loginAlert', 'danger', '❌ 找不到用戶資料');
            return false;
        }
        currentUser = user;
        return true;
    } catch(e) {
        const msg = e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential' ? '❌ 密碼錯誤' :
                    e.code === 'auth/user-not-found' ? '❌ 帳戶不存在' : '❌ ' + e.message;
        showAlert('loginAlert', 'danger', msg);
        return false;
    }
}

document.getElementById('loginBtn').addEventListener('click', async function() {
    const id = document.getElementById('loginId').value.trim();
    const pw = document.getElementById('loginPw').value;
    clearAlert('loginAlert');
    if (!id || !pw) { showAlert('loginAlert', 'warning', '⚠️ 請輸入學號和密碼'); return; }
    
    const ok = await doLogin(id, pw);
    if (ok) { showAlert('loginAlert', 'success', '✅ 登入成功！'); enterMainApp(); }
});

document.getElementById('loginPw').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
});
document.getElementById('loginId').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

// ============================================================
// 🏠 進入主畫面（角色分明！）
// ============================================================
function enterMainApp() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainPage').classList.remove('hidden');
    
    const isTeacher = currentUser.isTeacher || false;
    document.getElementById('userName').textContent = currentUser.name || '未知';
    document.getElementById('userId').textContent = `(${currentUser.userId})`;
    document.getElementById('userRole').textContent = isTeacher ? '👩‍🏫 老師' : '🧑‍🎓 學生';
    
    // ✅ 角色分明：老師只睇到老師嘢，學生只睇到學生嘢
    const teacherZone = document.getElementById('teacherZone');
    const studentZone = document.getElementById('studentZone');
    
    if (isTeacher) {
        teacherZone.classList.add('visible');
        studentZone.classList.remove('visible');
        currentClass = currentUser.className || currentUser.managedClasses?.[0] || 'VIP';
        document.getElementById('classDisplay').textContent = `(${currentClass})`;
        renderStudentList();
    } else {
        teacherZone.classList.remove('visible');
        studentZone.classList.add('visible');
        // 檢查是否首次登入
        if (currentUser.isFirstLogin) {
            document.getElementById('firstLoginWarning').classList.remove('hidden');
        } else {
            document.getElementById('firstLoginWarning').classList.add('hidden');
        }
    }
    document.getElementById('statusText').textContent = '✅ 已登入';
}

// ============================================================
// 📝 老師：建立學生
// ============================================================
document.getElementById('createBtn').addEventListener('click', async function() {
    const name = document.getElementById('regName').value.trim();
    const cls = document.getElementById('regClass').value.trim() || 'VIP';
    const phone = document.getElementById('regPhone').value.trim();
    const customId = document.getElementById('regId').value.trim() || null;
    clearAlert('createAlert');
    
    if (!name || !phone) { showAlert('createAlert', 'warning', '⚠️ 請填姓名和電話'); return; }
    
    let userId = customId;
    if (!userId) {
        const students = await loadStudentsFromFirestore(cls);
        const num = students.length + 1;
        userId = String(num).padStart(6, '0');
    }
    
    const existing = await findUserInFirestore(userId);
    if (existing) { showAlert('createAlert', 'danger', '❌ 學號 ' + userId + ' 已被使用'); return; }
    
    const pw = genPw();
    const user = {
        userId, name, className: cls, phone,
        initialPassword: pw, password: null,
        isFirstLogin: true, isTeacher: false,
        managedClasses: [cls],
        createdAt: new Date().toISOString(),
        latestStatus: {}, allAttempts: [], favorites: [],
        practiceHistory: [], achievements: {}, stats: {}
    };
    
    try {
        await db.collection('users').doc(userId).set(user);
        const email = userId + '@mastering-science.com';
        try { await auth.createUserWithEmailAndPassword(email, pw); }
        catch(e) { if (e.code !== 'auth/email-already-in-use') throw e; }
        
        showAlert('createAlert', 'success', `✅ 建立成功！<br>👤 ${name}（${userId}）<br>🔑 <span class="pw-display">${pw}</span>`);
        document.getElementById('regName').value = '';
        document.getElementById('regId').value = '';
        document.getElementById('regPhone').value = '';
        renderStudentList();
    } catch(e) {
        showAlert('createAlert', 'danger', '❌ 建立失敗：' + e.message);
        await db.collection('users').doc(userId).delete().catch(()=>{});
    }
});

// ============================================================
// 👨‍🎓 老師：顯示學生列表
// ============================================================
async function renderStudentList() {
    const container = document.getElementById('studentList');
    try {
        allStudents = await loadStudentsFromFirestore(currentClass);
        if (allStudents.length === 0) {
            container.innerHTML = '<div class="empty-state">還沒有學生</div>';
            return;
        }
        let html = '';
        for (const s of allStudents) {
            const statusClass = s.isFirstLogin ? 'status-pending' : 'status-done';
            const statusText = s.isFirstLogin ? '⏳ 未改密碼' : '✅ 已改密碼';
            html += `
                <div class="student-item">
                    <div class="info">
                        <span class="name">${s.name}</span>
                        <span class="id">${s.userId}</span>
                        <span class="status ${statusClass}">${statusText}</span>
                    </div>
                    <div class="actions">
                        <button class="btn btn-outline btn-sm" onclick="showStudentPassword('${s.userId}')">🔑 密碼</button>
                        <button class="btn btn-warning btn-sm" onclick="resetStudentPassword('${s.userId}')">🔄 重置</button>
                        <button class="btn btn-primary btn-sm" onclick="fixStudentAuth('${s.userId}')">🔧 修復</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteStudent('${s.userId}')">🗑️ 刪除</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    } catch(e) {
        container.innerHTML = '<div class="empty-state">載入失敗</div>';
        console.error(e);
    }
}

// ============================================================
// 🔑 老師：顯示學生密碼
// ============================================================
async function showStudentPassword(userId) {
    const user = await findUserInFirestore(userId);
    if (!user) { alert('找不到學生'); return; }
    const pw = user.initialPassword || '（已修改密碼）';
    alert(`👤 ${user.name}（${user.userId}）\n🔑 初始密碼：${pw}`);
}

// ============================================================
// 🔄 老師：重置學生密碼
// ============================================================
async function resetStudentPassword(userId) {
    if (!confirm('確定要重置 ' + userId + ' 的密碼嗎？')) return;
    const user = await findUserInFirestore(userId);
    if (!user) { alert('找不到學生'); return; }
    
    const newPw = genPw();
    try {
        await db.collection('users').doc(userId).set({
            initialPassword: newPw,
            password: null,
            isFirstLogin: true
        }, { merge: true });
        
        const email = userId + '@mastering-science.com';
        const fbUser = auth.currentUser;
        if (fbUser) {
            await fbUser.updatePassword(newPw);
        } else {
            try {
                const cred = await auth.signInWithEmailAndPassword(email, user.password || user.initialPassword);
                await cred.user.updatePassword(newPw);
            } catch(e) {
                await auth.createUserWithEmailAndPassword(email, newPw);
            }
        }
        alert(`✅ 重置成功！新密碼：${newPw}`);
        renderStudentList();
    } catch(e) {
        alert('❌ 重置失敗：' + e.message);
    }
}

// ============================================================
// 🔧 老師：修復學生 Auth
// ============================================================
async function fixStudentAuth(userId) {
    if (!confirm('🔧 確定要修復 ' + userId + ' 的登入問題嗎？')) return;
    const user = await findUserInFirestore(userId);
    if (!user) { alert('找不到學生'); return; }
    
    const email = userId + '@mastering-science.com';
    const pw = user.initialPassword || genPw();
    
    try {
        try {
            await auth.signInWithEmailAndPassword(email, pw);
            alert(`✅ 帳戶正常！密碼：${pw}`);
            return;
        } catch(e) {
            if (e.code === 'auth/user-not-found') {
                await auth.createUserWithEmailAndPassword(email, pw);
                alert(`✅ Auth 帳戶已建立！密碼：${pw}`);
            } else if (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') {
                const oldPw = user.password || user.initialPassword;
                try {
                    const cred = await auth.signInWithEmailAndPassword(email, oldPw);
                    await cred.user.updatePassword(pw);
                    alert(`✅ Auth 已修復！新密碼：${pw}`);
                } catch(err) {
                    alert(`⚠️ 無法自動修復，請在 Firebase Console 手動處理\n📧 ${email}\n🔑 ${pw}`);
                }
            } else {
                throw e;
            }
        }
    } catch(e) {
        alert('❌ 修復失敗：' + e.message);
    }
}

// ============================================================
// 🗑️ 老師：刪除學生
// ============================================================
async function deleteStudent(userId) {
    if (!confirm(`⚠️ 確定要刪除 ${userId} 嗎？此操作無法復原！`)) return;
    if (!confirm('再次確認：刪除學生將移除所有資料！')) return;
    
    try {
        await db.collection('users').doc(userId).delete();
        alert(`✅ 已從 Firestore 刪除 ${userId}\n\n⚠️ Auth 帳戶需要手動在 Firebase Console 刪除`);
        renderStudentList();
    } catch(e) {
        alert('❌ 刪除失敗：' + e.message);
    }
}

    try {
        await db.collection('users').doc(id).set({
            initialPassword: newPw,
            password: null,
            isFirstLogin: true
        }, { merge: true });
        
        const email = id + '@mastering-science.com';
        const fbUser = auth.currentUser;
        if (fbUser) {
            await fbUser.updatePassword(newPw);
        } else {
            try {
                const cred = await auth.signInWithEmailAndPassword(email, user.password || user.initialPassword);
                await cred.user.updatePassword(newPw);
            } catch(e) {
                await auth.createUserWithEmailAndPassword(email, newPw);
            }
        }
        showAlert('forgotAlert', 'success', `✅ 密碼已重設！<br>🔑 <span class="pw-display">${newPw}</span>`);

        document.getElementById('forgotPhone').value = '';

    }
});

// ============================================================
// 🔑 學生：首次登入強制改密碼
// ============================================================
document.getElementById('firstChangeBtn').addEventListener('click', async function() {
    const newPw = document.getElementById('firstNewPw').value;
    const confirmPw = document.getElementById('firstConfirmPw').value;
    clearAlert('firstLoginAlert');
    
    if (newPw.length < 6) { showAlert('firstLoginAlert', 'warning', '⚠️ 密碼至少6個字元'); return; }
    if (newPw !== confirmPw) { showAlert('firstLoginAlert', 'warning', '❌ 兩次密碼不一致'); return; }
    if (!currentUser) { showAlert('firstLoginAlert', 'danger', '❌ 請先登入'); return; }
    
    const userId = currentUser.userId;
    try {
        await db.collection('users').doc(userId).set({
            password: newPw,
            isFirstLogin: false
        }, { merge: true });
        currentUser = await findUserInFirestore(userId);
        
        const fbUser = auth.currentUser;
        if (fbUser) {
            await fbUser.updatePassword(newPw);
        } else {
            const email = userId + '@mastering-science.com';
            const cred = await auth.signInWithEmailAndPassword(email, currentUser.initialPassword);
            await cred.user.updatePassword(newPw);
        }
        showAlert('firstLoginAlert', 'success', '✅ 密碼設定成功！請重新登入');
        document.getElementById('firstNewPw').value = '';
        document.getElementById('firstConfirmPw').value = '';
        document.getElementById('firstLoginWarning').classList.add('hidden');
        setTimeout(() => {
            alert('✅ 密碼已設定！請用新密碼重新登入');
            logout();
        }, 1500);
    } catch(e) {
        showAlert('firstLoginAlert', 'danger', '❌ 設定失敗：' + e.message);
    }
});

// 🔑 學生：一般修改密碼

document.getElementById('changeBtn').addEventListener('click', async function() {
    const oldPw = document.getElementById('changeOldPw').value;

    if (!currentUser) { showAlert('changeAlert', 'danger', '❌ 請先登入'); return; }
    
    const userId = currentUser.userId;
    const validOld = currentUser.password || currentUser.initialPassword;
    if (oldPw !== validOld) { showAlert('changeAlert', 'warning', '❌ 舊密碼不正確'); return; }
    
    try {
        await db.collection('users').doc(userId).set({
            password: newPw,
            isFirstLogin: false
        }, { merge: true });
        currentUser = await findUserInFirestore(userId);
        
        const fbUser = auth.currentUser;
        if (fbUser) {
            await fbUser.updatePassword(newPw);
        } else {
            const email = userId + '@mastering-science.com';
            const cred = await auth.signInWithEmailAndPassword(email, oldPw);
            await cred.user.updatePassword(newPw);
        }
        showAlert('changeAlert', 'success', '✅ 密碼已修改！請用新密碼重新登入');
        document.getElementById('changeOldPw').value = '';
        document.getElementById('changeNewPw').value = '';
        document.getElementById('changeConfirmPw').value = '';
        setTimeout(() => {
            alert('✅ 密碼已修改！請用新密碼重新登入');

        }, 1500);
    } catch(e) {
        showAlert('changeAlert', 'danger', '❌ 修改失敗：' + e.message);
    }
});

// ============================================================
// 🚪 登出
// ============================================================
function logout() {
    if (!confirm('確定要登出嗎？')) return;
    auth.signOut();
    currentUser = null;
    document.getElementById('loginPage').style.display = 'block';
    document.getElementById('mainPage').classList.add('hidden');
    document.getElementById('loginPw').value = '';
    document.getElementById('statusText').textContent = '⏳ 已登出';
}

// ============================================================
// 🔥 Auth 狀態監聽
// ============================================================
auth.onAuthStateChanged(async user => {
    if (user && !currentUser) {
        const email = user.email;
        if (email && email.endsWith('@mastering-science.com')) {
            const id = email.replace('@mastering-science.com', '');
            const found = await findUserInFirestore(id);
            if (found) {
                currentUser = found;
                if (!document.getElementById('mainPage').classList.contains('hidden')) {
                    enterMainApp();
                }
            }
        }
    }
});
