<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🧪 橫置測試 - Mastering Science</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f0ff;
            font-family: system-ui, sans-serif;
            padding: 12px;
            min-height: 100vh;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .btn {
            border: none;
            background: #4a1d8c;
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-outline {
            background: white;
            color: #4a1d8c;
            border: 2px solid #4a1d8c;
        }
        .btn-success {
            background: #10b981;
            color: white;
        }
        .btn-danger {
            background: #dc2626;
            color: white;
        }
        .btn-small {
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
        }

        /* ===== 登入畫面 ===== */
        #loginScreen {
            max-width: 400px;
            margin: 80px auto;
        }
        #loginScreen h2 {
            color: #4a1d8c;
            font-size: 1.4rem;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: #2e0f5a;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 40px;
            border: 2px solid #e0d6f5;
            font-size: 1rem;
            outline: none;
        }
        .form-group input:focus {
            border-color: #4a1d8c;
        }
        #loginError {
            color: #dc2626;
            font-size: 0.85rem;
            margin-bottom: 8px;
            display: none;
        }

        /* ===== 主介面（極簡） ===== */
        .nav-tabs {
            display: flex;
            gap: 0.3rem;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }
        .tab {
            background: none;
            border: none;
            padding: 0.3rem 0.7rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 40px;
            font-size: 0.8rem;
        }
        .tab.active {
            background: #4a1d8c;
            color: white;
        }

        .unit-group { margin-bottom: 0.5rem; }
        .unit-header {
            background: #ede9fe;
            border-radius: 20px;
            padding: 0.5rem 0.7rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #2e0f5a;
        }
        .chapters-container {
            margin-left: 1rem;
            margin-top: 0.3rem;
            display: none;
        }
        .chapters-container.open { display: block; }
        .chapter-item {
            background: white;
            border-radius: 12px;
            padding: 0.35rem 0.6rem;
            margin-bottom: 0.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #7c3aed;
        }
        .chapter-name { font-size: 0.8rem; font-weight: 500; }
        .chapter-actions { display: flex; gap: 0.3rem; }

        .mastery-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .progress-bar-container {
            width: 100px;
            height: 10px;
            background: #ddd;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: #10b981;
            width: 0%;
            border-radius: 20px;
        }
        .mastery-text {
            font-size: 0.7rem;
            min-width: 50px;
            text-align: right;
        }

        /* ===== 📱 測試重點：桌面版做題彈窗 ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-content {
            background: white;
            width: 98%;
            max-width: 1000px;
            height: 620px;
            max-height: 92vh;
            border-radius: 28px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(74, 29, 140, 0.15);
        }

        /* 左側主面板 */
        .main-panel {
            flex: 1;
            padding: 24px 28px 20px 28px;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: #ffffff;
            overflow: hidden;
        }
        .question-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .question-text {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.5;
            color: #1a1a2e;
            margin-bottom: 12px;
            flex-shrink: 0;
            word-break: break-word;
        }
        .image-area {
            text-align: center;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        .image-area img {
            max-height: 110px;
            max-width: 100%;
            object-fit: contain;
            border-radius: 8px;
            border: 1px solid #e9e4f5;
            padding: 4px;
            cursor: pointer;
        }
        .image-area:not(:has(img)) { display: none !important; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            flex: 1;
            align-content: center;
            min-height: 0;
        }
        .option-btn {
            background: #faf8ff;
            border: 2px solid #e0d6f5;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 15px;
            font-weight: 500;
            color: #1e1b4b;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            align-items: center;
            min-height: 44px;
            word-break: break-word;
            line-height: 1.3;
        }
        .option-btn:hover:not(.selected) {
            border-color: #4a1d8c;
            background: #f5f0ff;
        }
        .option-btn::before {
            content: "○";
            display: inline-block;
            width: 22px;
            font-size: 16px;
            color: #a78bbf;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .option-btn.selected {
            border-color: #4a1d8c;
            background: #4a1d8c;
            color: white;
        }
        .option-btn.selected::before {
            content: "●";
            color: white;
        }

        /* 右側邊欄 */
        .sidebar {
            width: 210px;
            min-width: 170px;
            background: linear-gradient(145deg, #3b1a6e, #2d0f54);
            padding: 18px 14px 14px 14px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }
        .sidebar-row-1 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            flex-shrink: 0;
        }
        .sidebar-row-1 .difficulty {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
        }
        .sidebar-row-1 .timer {
            font-size: 14px;
            font-weight: 600;
            color: #fca5a5;
        }
        .sidebar-row-2 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            flex-shrink: 0;
        }
        .sidebar-row-2 .counter {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
        }
        .nav-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            padding: 10px 0 8px 0;
            flex: 1;
            align-content: flex-start;
            min-height: 0;
            overflow-y: auto;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            margin-bottom: 8px;
        }
        .nav-dot {
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: none;
            font-weight: 600;
            color: #c4b5d4;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            width: 24px;
            height: 24px;
            font-size: 9px;
        }
        .nav-dot.current {
            background: #8b5cf6;
            color: white;
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.4);
        }
        .nav-dot.answered {
            background: #34d399;
            color: white;
        }
        .nav-dot.unanswered {
            background: #fbbf24;
            color: #7c5a00;
        }

        .sidebar-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        .sidebar-actions .btn {
            flex: 1;
            padding: 6px 4px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            min-height: 28px;
        }
        .sidebar-actions .btn-prev {
            background: #ffffff;
            color: #4a1d8c;
        }
        .sidebar-actions .btn-next {
            background: #ffffff;
            color: #4a1d8c;
        }
        .sidebar-actions .btn-submit {
            background: #10b981;
            color: white;
        }
        .sidebar-actions .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ✅ 測試用：強制全屏橫置按鈕 */
        #testFullscreenBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 99999;
            background: #4a1d8c;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(74, 29, 140, 0.4);
        }
        #testFullscreenBtn:hover {
            background: #7c3aed;
            transform: scale(1.05);
        }

        /* 退出全屏按鈕（做題時顯示） */
        #exitFullscreenBtn {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 99999;
            background: rgba(0,0,0,0.6);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: none;
        }
        #exitFullscreenBtn:hover {
            background: rgba(0,0,0,0.8);
        }

        /* 手機小螢幕優化 */
        @media (max-width: 640px) {
            .modal-content {
                height: auto;
                max-height: 95vh;
                flex-direction: column;
                border-radius: 16px;
            }
            .sidebar {
                width: 100%;
                min-width: unset;
                flex-direction: row;
                flex-wrap: wrap;
                padding: 10px 12px;
                border-left: none;
                border-top: 1px solid rgba(255,255,255,0.08);
                max-height: 140px;
                overflow-y: auto;
                gap: 4px;
            }
            .sidebar-row-1, .sidebar-row-2 {
                width: auto;
                border-bottom: none;
                padding: 2px 6px;
            }
            .nav-grid {
                padding: 4px 0;
                border-bottom: none;
                margin-bottom: 0;
                flex: 0 0 auto;
                max-height: 50px;
                overflow-y: auto;
                width: 100%;
            }
            .nav-dot {
                width: 20px;
                height: 20px;
                font-size: 8px;
            }
            .sidebar-actions {
                width: 100%;
                justify-content: center;
            }
            .sidebar-actions .btn {
                flex: 0 1 auto;
                padding: 4px 12px;
                font-size: 11px;
                min-height: 24px;
            }
            .main-panel {
                padding: 16px 16px 12px 16px;
            }
            .options-grid {
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }
            .option-btn {
                padding: 10px 12px;
                font-size: 13px;
                min-height: 36px;
            }
            .question-text {
                font-size: 16px;
            }
            .image-area img {
                max-height: 80px;
            }
        }

        @keyframes blink {
            0% { background: #10b981; transform: scale(1); }
            50% { background: #f59e0b; transform: scale(1.05); }
            100% { background: #10b981; transform: scale(1); }
        }
        #submitAllBtn {
            transition: all 0.2s;
        }

        .result-container { overflow-y: auto; max-height: 60vh; padding: 10px 0; }
        .result-summary-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
            background: #f5f0ff;
            padding: 12px 16px;
            border-radius: 40px;
        }
        .result-progress {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            flex-wrap: wrap;
        }
        .result-progress span {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .big-progress-bar {
            flex: 1;
            min-width: 150px;
            height: 24px;
            background: #ddd;
            border-radius: 30px;
            overflow: hidden;
        }
        .big-progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 30px;
            transition: width 0.3s ease;
        }
        .result-buttons { display: flex; gap: 10px; }
        .result-buttons .btn { padding: 6px 14px; font-size: 0.8rem; }

        .result-card {
            background: white;
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 10px;
            border-left: 6px solid;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .result-card.correct { border-left-color: #10b981; background: #f0fdf4; }
        .result-card.wrong { border-left-color: #dc2626; background: #fef2f2; }
        .result-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        .result-card-question { font-weight: 600; font-size: 0.9rem; flex: 1; }
        .result-card-icon { font-size: 1.2rem; }
        .result-card-details {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 0;
            padding: 8px 0;
            border-top: 1px solid #e9e4f5;
            border-bottom: 1px solid #e9e4f5;
        }
        .result-card-details span {
            background: #f5f0ff;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        .result-card-actions { margin-top: 8px; }
        .result-card-actions button {
            background: #f5f0ff;
            border: none;
            color: #4a1d8c;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        #explainModal .modal-content { max-width: 600px; height: auto; padding: 24px; flex-direction: column; }
        .explain-content { overflow-y: auto; max-height: 60vh; }
    </style>
</head>
<body>

<!-- ===== 登入畫面 ===== -->
<div id="loginScreen" class="card">
    <h2>🧪 橫置測試</h2>
    <div style="margin: 8px 0 16px; color:#666;">點擊「開始練習」→ 自動全屏橫置 → 顯示桌面版</div>
    <div id="loginError"></div>
    <div class="form-group">
        <label>登入 ID</label>
        <input type="text" id="loginUserId" placeholder="VIP001 或 ADMIN001">
    </div>
    <div class="form-group">
        <label>密碼</label>
        <input type="password" id="loginPassword" placeholder="NewPwd123">
    </div>
    <button class="btn" id="loginBtn" style="width:100%; padding:12px;">🔒 登入</button>
</div>

<!-- ===== 主介面 ===== -->
<div id="mainApp" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.8rem;">
        <h1 style="color:#4a1d8c; font-size:1.2rem;">📘 Mastering Science</h1>
        <span id="userLabel" style="font-size:0.85rem;"></span>
    </div>
    <div class="nav-tabs">
        <button class="tab active" data-tab="practice">📖 練習</button>
        <button class="tab" data-tab="teacher" id="teacherTab" style="display:none;">🧑‍🏫 後台</button>
    </div>
    <div id="practicePanel"></div>
    <div id="teacherPanel" style="display:none;"></div>
</div>

<!-- ===== 桌面版做題彈窗（測試用） ===== -->
<div id="desktopQuizModal" class="modal">
    <div class="modal-content">
        <div class="main-panel" id="desktopMainPanel">
            <div class="question-area">
                <div class="question-text" id="desktopQuestionText">載入中...</div>
                <div class="image-area" id="desktopImageArea"></div>
                <div class="options-grid" id="desktopOptions"></div>
            </div>
        </div>
        <div class="sidebar" id="desktopSidebar">
            <div class="sidebar-row-1">
                <span class="difficulty" id="desktopDifficulty">📈 Advanced</span>
                <span class="timer" id="desktopTimer">⏱️ 00:00</span>
            </div>
            <div class="sidebar-row-2">
                <span class="counter" id="desktopCounter">1 / 10</span>
            </div>
            <div class="nav-grid" id="desktopNav"></div>
            <div class="sidebar-actions">
                <button class="btn btn-prev" id="desktopPrevBtn">◀</button>
                <button class="btn btn-next" id="desktopNextBtn">▶</button>
                <button class="btn btn-submit" id="desktopSubmitBtn">✅ 提交</button>
            </div>

</div>

<!-- ===== 結果彈窗 ===== -->
<div id="resultModal" class="modal">
    <div class="modal-content" style="flex-direction:column; height:auto; max-height:90vh; padding:24px;">
        <h3>📊 成績總表</h3>
        <div id="resultContent" class="result-container"></div>
        <button id="closeResultBtn" class="btn" style="margin-top:16px; align-self:center;">關閉</button>
    </div>
</div>

<!-- ===== 題解彈窗 ===== -->
<div id="explainModal" class="modal">
    <div class="modal-content">
        <div id="explainContent" class="explain-content"></div>
        <button id="closeExplainBtn" class="btn" style="margin-top:12px; align-self:center;">返回</button>
    </div>
</div>

<!-- ===== 🧪 測試按鈕：手動觸發全屏橫置 ===== -->
<button id="testFullscreenBtn">🧪 測試全屏橫置</button>

<!-- ===== 退出全屏按鈕 ===== -->
<button id="exitFullscreenBtn">🚪 退出全屏</button>

<script>
// ============================================================
// 🔥 Firebase 設定（複製自你的專案）
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyBWUr-qFjDuAbRn2ueCOA24Bx5vHhGwCzs",
    authDomain: "mastering-science.firebaseapp.com",
    projectId: "mastering-science",
    storageBucket: "mastering-science.firebasestorage.app",
    messagingSenderId: "969510026630",
    appId: "1:969510026630:web:5c0ff3ffc7b3bdc04c8007"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// ============================================================
// 🔥 題庫（極簡版，只保留 2 題做測試）
// ============================================================
window.ALL_UNITS = {
    "1": {
        "name": "🌍 Planet Earth（地球）",
        "chapters": {
            "1": {
                "name": "1. Fundamentals of Chemistry（化學基礎）",
                "questions": [
                    {
                        "id": "C11A001",
                        "text": "Chemistry 的中文是？",
                        "options": ["A. 化學", "B. 化學品", "C. 實驗室", "D. 變化"],
                        "correct": "A",
                        "explanation": "Chemistry 的中文是化學。",
                        "imageUrl": null,
                        "difficulty": "✅ Basic",
                        "difficulty_level": 1,
                        "sf": 1
                    },
                    {
                        "id": "C11A002",
                        "text": "Warning label 的中文是？",
                        "options": ["A. 危險警告標籤", "B. 安全措施", "C. 縱切面圖", "D. 鐵絲網"],
                        "correct": "A",
                        "explanation": "Warning label 的中文是危險警告標籤。",
                        "imageUrl": null,
                        "difficulty": "✅ Basic",
                        "difficulty_level": 1,
                        "sf": 1
                    }
                ]
            }
        }
    }
};

// ============================================================
// 🧪 核心測試函數：全屏 + 橫置
// ============================================================
async function forceLandscapeAndFullscreen() {
    console.log('🧪 嘗試全屏橫置...');
    try {
        // 1. 進入全屏
        if (!document.fullscreenElement) {
            await document.documentElement.requestFullscreen();
            console.log('✅ 全屏成功');
        }
        // 2. 鎖定橫置
        if (window.screen && window.screen.orientation) {
            await window.screen.orientation.lock('landscape');
            console.log('✅ 橫置鎖定成功');
        }
        return true;
    } catch (e) {
        console.warn('⚠️ 全屏/橫置失敗:', e.message);
        alert('💡 請手動將手機橫置，並允許全屏權限');
        return false;
    }
}

// 退出全屏
async function exitFullscreenMode() {
    try {
        if (document.fullscreenElement) {
            await document.exitFullscreen();
        }
        if (window.screen && window.screen.orientation) {
            await window.screen.orientation.unlock();
        }
        console.log('✅ 已退出全屏');
    } catch (e) {
        console.warn('⚠️ 退出失敗:', e.message);
    }
    document.getElementById('exitFullscreenBtn').style.display = 'none';
}

// ============================================================
// 🧪 測試按鈕：手動觸發
// ============================================================
document.getElementById('testFullscreenBtn').addEventListener('click', async function() {
    await forceLandscapeAndFullscreen();
    alert('✅ 已進入全屏橫置模式！\n\n如果畫面還是直的，請手動轉一下手機。');
});

document.getElementById('exitFullscreenBtn').addEventListener('click', exitFullscreenMode);

// ============================================================
// 🧪 做題邏輯（極簡版）
// ============================================================
let currentQuestions = [];
let currentOptionsMapping = [];
let currentAnswers = [];
let currentQIndex = 0;
let timerInterval = null;
let timeRemaining = 0;
let startTime = null;
let lastResults = null;
let blinkInterval = null;
let currentUser = null;
let userData = { latestStatus: {}, allAttempts: [], favorites: [], practiceHistory: [], achievements: {} };

// ===== 登入 =====
document.getElementById('loginBtn').addEventListener('click', async function() {
    const userId = document.getElementById('loginUserId').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const errEl = document.getElementById('loginError');

    if (!userId || !password) {
        errEl.textContent = '⚠️ 請輸入帳號和密碼';
        errEl.style.display = 'block';
        return;
    }

    try {
        const email = userId + '@mastering-science.com';
        await auth.signInWithEmailAndPassword(email, password);
        errEl.style.display = 'none';

        // 從 Firestore 讀取用戶資料
        const doc = await db.collection('users').doc(userId).get();
        if (doc.exists) {
            currentUser = doc.data();
        } else {
            // 如果 Firestore 沒有，建立基本資料
            currentUser = { userId: userId, name: userId, className: '測試班', isTeacher: (userId === 'ADMIN001') };
        }

        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';

        const teacherTab = document.getElementById('teacherTab');
        if (currentUser.isTeacher) teacherTab.style.display = 'inline-block';

        document.getElementById('userLabel').textContent = '👋 ' + currentUser.name;
        renderPractice();

        // 綁定分頁切換
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const target = this.dataset.tab;
                document.getElementById('practicePanel').style.display = (target === 'practice') ? 'block' : 'none';
                document.getElementById('teacherPanel').style.display = (target === 'teacher') ? 'block' : 'none';
                if (target === 'teacher') renderTeacherPanel();
            });
        });

    } catch (e) {
        errEl.textContent = '❌ ' + (e.message || '登入失敗');
        errEl.style.display = 'block';
    }
});

// ===== 練習頁面 =====
function renderPractice() {
    const container = document.getElementById('practicePanel');
    let html = '';
    for (let unit in window.ALL_UNITS) {
        let unitObj = window.ALL_UNITS[unit];
        for (let ch in unitObj.chapters) {
            let chObj = unitObj.chapters[ch];
            let total = chObj.questions.length;
            let correct = 0;
            for (let q of chObj.questions) {
                if (userData.latestStatus[q.id] === true) correct++;
            }
            let percent = total === 0 ? 0 : Math.round(correct / total * 100);
            html += `
                <div class="unit-group">
                    <div class="unit-header">
                        <span>${unitObj.name} - ${chObj.name}</span>
                        <div class="mastery-wrapper">
                            <div class="progress-bar-container">
                                <div class="progress-bar-fill" style="width:${percent}%;"></div>
                            </div>
                            <span class="mastery-text">${percent}%</span>
                        </div>
                    </div>
                    <div class="chapters-container open">
                        <div class="chapter-item">
                            <span class="chapter-name">${chObj.questions.length} 題</span>
                            <div class="chapter-actions">
                                <button class="btn btn-small practice-btn" data-unit="${unit}" data-chapter="${ch}">✏️ 開始練習</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
    }
    container.innerHTML = html;

    document.querySelectorAll('.practice-btn').forEach(btn => {
        btn.addEventListener('click', async function() {
            const unit = this.dataset.unit;
            const chapter = this.dataset.chapter;
            await startPractice(unit, chapter);
        });
    });
}

// ===== 🧪 核心：開始練習（強制全屏橫置 + 桌面版） =====
async function startPractice(unit, chapter) {
    const questions = window.ALL_UNITS[unit].chapters[chapter].questions;
    if (questions.length === 0) { alert('此章節暫無題目'); return; }

    // 先執行全屏橫置
    await forceLandscapeAndFullscreen();

    // 顯示退出按鈕
    document.getElementById('exitFullscreenBtn').style.display = 'block';

    // 準備題目
    currentQuestions = shuffleArray([...questions]);
    currentOptionsMapping = currentQuestions.map(q => {
        let letters = ['A', 'B', 'C', 'D'], map = {};
        for (let i = 0; i < 4; i++) {
            let optText = q.options[i].substring(3);
            map[letters[i]] = optText;
        }
        return { letterToText: map, correctLetter: q.correct };
    });
    currentAnswers = new Array(currentQuestions.length).fill(null);
    currentQIndex = 0;

    // 計時器（每題 90 秒）
    timeRemaining = currentQuestions.length * 90;
    updateDesktopTimer();

    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (timeRemaining <= 0) {
            submitDesktopAll();
        } else {
            timeRemaining--;
            updateDesktopTimer();
        }
    }, 1000);

    // 顯示桌面版彈窗
    document.getElementById('desktopQuizModal').style.display = 'flex';
    renderDesktopNav();
    renderDesktopQuestion();
    updateDesktopNavButtons();
    checkDesktopAllAnswered();

    startTime = Date.now();
}

// ===== 輔助函數 =====
function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// ===== 桌面版渲染 =====
function renderDesktopNav() {
    const nav = document.getElementById('desktopNav');
    let html = '';
    for (let i = 0; i < currentQuestions.length; i++) {
        let cls = 'nav-dot';
        if (i === currentQIndex) cls += ' current';
        else if (currentAnswers[i] !== null) cls += ' answered';
        else cls += ' unanswered';
        html += `<button class="${cls}" data-idx="${i}">${i + 1}</button>`;
    }
    nav.innerHTML = html;
    document.getElementById('desktopCounter').textContent = `${currentQIndex + 1} / ${currentQuestions.length}`;

    nav.querySelectorAll('.nav-dot').forEach(btn => {
        btn.addEventListener('click', function() {
            currentQIndex = parseInt(this.dataset.idx);
            renderDesktopNav();
            renderDesktopQuestion();
            updateDesktopNavButtons();
            checkDesktopAllAnswered();
        });
    });
}

function renderDesktopQuestion() {
    const q = currentQuestions[currentQIndex];
    const map = currentOptionsMapping[currentQIndex];

    document.getElementById('desktopQuestionText').textContent = q.text;
    document.getElementById('desktopDifficulty').textContent = q.difficulty;

    // 圖片
    const imgArea = document.getElementById('desktopImageArea');
    if (q.imageUrl) {
        imgArea.innerHTML = `<img src="${q.imageUrl}" style="max-height:110px; max-width:100%; object-fit:contain;">`;
        imgArea.style.display = 'block';
    } else {
        imgArea.innerHTML = '';
        imgArea.style.display = 'none';
    }

    // 選項
    const optsDiv = document.getElementById('desktopOptions');
    optsDiv.innerHTML = '';
    for (let l of ['A', 'B', 'C', 'D']) {
        let btn = document.createElement('button');
        btn.className = 'option-btn';
        if (currentAnswers[currentQIndex] === l) btn.classList.add('selected');
        btn.textContent = `${l}. ${map.letterToText[l]}`;
        btn.addEventListener('click', function() {
            currentAnswers[currentQIndex] = l;
            renderDesktopQuestion();
            renderDesktopNav();
            checkDesktopAllAnswered();
        });
        optsDiv.appendChild(btn);
    }

    document.getElementById('desktopCounter').textContent = `${currentQIndex + 1} / ${currentQuestions.length}`;
    updateDesktopNavButtons();
    checkDesktopAllAnswered();
}

function updateDesktopNavButtons() {
    document.getElementById('desktopPrevBtn').disabled = (currentQIndex === 0);
    document.getElementById('desktopNextBtn').disabled = (currentQIndex === currentQuestions.length - 1);
}

function updateDesktopTimer() {
    let m = Math.floor(timeRemaining / 60);
    let s = timeRemaining % 60;
    document.getElementById('desktopTimer').textContent = `⏱️ ${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function checkDesktopAllAnswered() {
    const allAnswered = currentAnswers.every(a => a !== null);
    const btn = document.getElementById('desktopSubmitBtn');
    if (allAnswered && currentAnswers.length > 0) {
        if (!blinkInterval) {
            blinkInterval = setInterval(() => {
                btn.style.animation = 'blink 0.3s step-end infinite';
            }, 100);
        }
    } else {
        if (blinkInterval) {
            clearInterval(blinkInterval);
            blinkInterval = null;
            btn.style.animation = '';
        }
    }
}

// ===== 上下頁按鈕 =====
document.getElementById('desktopPrevBtn').addEventListener('click', function() {
    if (currentQIndex > 0) {
        currentQIndex--;
        renderDesktopNav();
        renderDesktopQuestion();
        updateDesktopNavButtons();
        checkDesktopAllAnswered();
    }
});

document.getElementById('desktopNextBtn').addEventListener('click', function() {
    if (currentQIndex < currentQuestions.length - 1) {
        currentQIndex++;
        renderDesktopNav();
        renderDesktopQuestion();
        updateDesktopNavButtons();
        checkDesktopAllAnswered();
    }
});

// ===== 提交 =====
document.getElementById('desktopSubmitBtn').addEventListener('click', submitDesktopAll);

function submitDesktopAll() {
    if (blinkInterval) {
        clearInterval(blinkInterval);
        blinkInterval = null;
        document.getElementById('desktopSubmitBtn').style.animation = '';
    }
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    const timeSpent = Math.round((Date.now() - startTime) / 1000);

    let results = [], correctCount = 0;
    for (let i = 0; i < currentQuestions.length; i++) {
        const q = currentQuestions[i];
        const map = currentOptionsMapping[i];
        const userLetter = currentAnswers[i];
        const isCorrect = (userLetter === map.correctLetter);
        if (isCorrect) correctCount++;
        results.push({
            question: q,
            userLetter: userLetter || '?',
            correctLetter: map.correctLetter,
            isCorrect: isCorrect
        });
        // 記錄到 userData
        userData.latestStatus[q.id] = isCorrect;
        userData.allAttempts.push({ qid: q.id, isCorrect: isCorrect, timestamp: Date.now() });
    }

    const accuracy = Math.round(correctCount / currentQuestions.length * 100);
    lastResults = results;

    // 關閉做題視窗
    document.getElementById('desktopQuizModal').style.display = 'none';
    document.getElementById('exitFullscreenBtn').style.display = 'none';

    // 顯示結果
    displayResults(results, accuracy);

    // 更新練習頁面進度
    renderPractice();
}

// ===== 顯示結果 =====
function displayResults(results, accuracy) {
    const container = document.getElementById('resultContent');
    const total = results.length;
    const correct = results.filter(r => r.isCorrect).length;
    const color = accuracy < 40 ? '#dc2626' : (accuracy < 70 ? '#f59e0b' : '#10b981');

    let html = `
        <div class="result-summary-bar">
            <div class="result-progress">
                <span>✅ ${accuracy}% (${correct}/${total})</span>
                <div class="big-progress-bar">
                    <div class="big-progress-fill" style="width:${accuracy}%; background:${color};"></div>
                </div>
            </div>
            <div class="result-buttons">
                <button class="btn btn-small" id="toggleWrongBtn">❌ 只顯示錯題</button>
            </div>
        </div>
        <div class="results-card-list" id="resultsList">
    `;

    let showOnlyWrong = false;
    const renderCards = (showWrong) => {
        const list = document.getElementById('resultsList');
        let cards = '';
        for (let i = 0; i < results.length; i++) {
            const r = results[i];
            if (showWrong && r.isCorrect) continue;
            const cls = r.isCorrect ? 'correct' : 'wrong';
            const icon = r.isCorrect ? '✅' : '❌';
            cards += `
                <div class="result-card ${cls}">
                    <div class="result-card-header">
                        <span class="result-card-question">${i + 1}. ${r.question.text}</span>
                        <span class="result-card-icon">${icon}</span>
                    </div>
                    <div class="result-card-details">
                        <span>📝 你的答案：${r.userLetter}</span>
                        <span>✓ 正解：${r.correctLetter}</span>
                    </div>
                    <div class="result-card-actions">
                        <button class="btn-explain" data-idx="${i}">📖 查看題解</button>
                    </div>
                </div>
            `;
        }
        list.innerHTML = cards;

        document.querySelectorAll('.btn-explain').forEach(btn => {
            btn.addEventListener('click', function() {
                const idx = parseInt(this.dataset.idx);
                const r = results[idx];
                document.getElementById('resultModal').style.display = 'none';
                showExplainModal(r);
            });
        });
    };

    container.innerHTML = html;
    renderCards(false);

    document.getElementById('toggleWrongBtn').addEventListener('click', function() {
        showOnlyWrong = !showOnlyWrong;
        renderCards(showOnlyWrong);
        this.textContent = showOnlyWrong ? '📋 顯示全部' : '❌ 只顯示錯題';
    });

    document.getElementById('resultModal').style.display = 'flex';
}

// ===== 題解彈窗 =====
function showExplainModal(r) {
    const q = r.question;
    const isCorrect = r.isCorrect;
    const userLetter = r.userLetter;
    const correctLetter = r.correctLetter;

    let optionsHtml = '';
    for (let opt of q.options) {
        let l = opt[0];
        let t = opt.substring(3);
        let cls = 'explain-option-normal';
        if (l === correctLetter) cls = 'explain-option-correct';
        else if (l === userLetter && !isCorrect) cls = 'explain-option-wrong';
        const bgColor = cls === 'explain-option-correct' ? '#d4edda' : (cls === 'explain-option-wrong' ? '#f8d7da' : 'transparent');
        optionsHtml += `<div style="padding:4px 8px; margin:2px 0; border-radius:8px; background:${bgColor};">${l}. ${t}</div>`;
    }

    document.getElementById('explainContent').innerHTML = `
        <div style="font-weight:600; margin-bottom:8px;">📖 題解</div>
        <div style="margin-bottom:8px;"><strong>題目：</strong>${q.text}</div>
        ${optionsHtml}
        <div style="margin-top:8px; padding:8px; background:#f5f0ff; border-radius:8px;">
            <strong>📖 題解：</strong>${q.explanation || '無'}
        </div>
        <div style="margin-top:8px;">
            <span>你的答案：${userLetter}</span> ｜
            <span>正解：${correctLetter}</span>
            <span style="margin-left:12px; font-weight:600; color:${isCorrect ? '#10b981' : '#dc2626'};">${isCorrect ? '✅ 答對了！' : '❌ 答錯了！'}</span>
        </div>
    `;
    document.getElementById('explainModal').style.display = 'flex';
}

document.getElementById('closeExplainBtn').addEventListener('click', function() {
    document.getElementById('explainModal').style.display = 'none';
    if (lastResults) displayResults(lastResults, Math.round(lastResults.filter(r => r.isCorrect).length / lastResults.length * 100));
});

document.getElementById('closeResultBtn').addEventListener('click', function() {
    document.getElementById('resultModal').style.display = 'none';
});
