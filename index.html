<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 密碼系統測試</title>
    
    <!-- Firebase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/firebase@12.15.0/firebase-app-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/firebase@12.15.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/firebase@12.15.0/firebase-auth-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f0ff;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 420px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        h1 {
            color: #4a1d8c;
            font-size: 1.3rem;
            text-align: center;
            margin-bottom: 4px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }
        .status-bar {
            background: #f0edf8;
            border-radius: 12px;
            padding: 8px 14px;
            margin-bottom: 16px;
            font-size: 0.8rem;
            color: #2e0f5a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-bar .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .dot.online { background: #10b981; }
        .dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
        .dot.offline { background: #dc2626; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .user-box {
            background: #ede9fe;
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            color: #2e0f5a;
            display: none;
        }
        .user-box.show { display: block; }
        
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            color: #2e0f5a;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 2px solid #e0d6f5;
            font-size: 0.95rem;
            outline: none;
        }
        .form-group input:focus { border-color: #4a1d8c; }
        
        .btn {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 4px;
        }
        .btn-primary { background: #4a1d8c; color: white; }
        .btn-primary:hover { background: #3b1a6e; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-outline { background: white; color: #4a1d8c; border: 2px solid #4a1d8c; }
        .btn-outline:hover { background: #f5f0ff; }
        .btn-sm { padding: 6px 14px; font-size: 0.8rem; width: auto; }
        
        .divider { height: 1px; background: #e0d6f5; margin: 16px 0; }
        .text-center { text-align: center; }
        .text-sm { font-size: 0.8rem; color: #888; }
        .mt-8 { margin-top: 8px; }
        .hidden { display: none !important; }
        
        .alert {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
        .alert-success { background: #d4edda; color: #065f46; }
        .alert-danger { background: #f8d7da; color: #7f1d1d; }
        .alert-warning { background: #fef3c7; color: #7c5a00; }
        
        .flex { display: flex; gap: 8px; }
        .flex .btn { flex: 1; }
        
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 48px;
        }
        .toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #888;
            padding: 4px;
        }
        .toggle-btn:hover { color: #4a1d8c; }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: white;
            border-radius: 24px;
            max-width: 400px;
            width: 90%;
            padding: 28px 24px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal-box h2 { color: #2e0f5a; margin-bottom: 4px; }
        .modal-box .close-btn {
            float: right;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        .modal-box .close-btn:hover { color: #333; }
        .password-display {
            font-family: monospace;
            font-size: 22px;
            background: #f0f0f0;
            padding: 8px 16px;
            border-radius: 8px;
            display: inline-block;
            margin: 8px 0;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔐 密碼系統測試</h1>
    <div class="subtitle">測試登入 + 修改密碼 (VIP001 / NewPwd123)</div>
    
    <!-- 狀態列 -->
    <div class="status-bar">
        <span>
            <span class="dot connecting" id="statusDot"></span>
            <span id="statusText">⏳ 連線中...</span>
        </span>
        <span id="statusTime" style="font-size:0.7rem; color:#999;">--:--:--</span>
    </div>
    
    <!-- 用戶資訊 -->
    <div class="user-box" id="userBox">
        <div>👤 <span id="displayName">-</span> (<span id="displayId">-</span>)</div>
        <div style="font-size:0.75rem; color:#888;">📚 班級：<span id="displayClass">-</span></div>
        <button class="btn btn-danger btn-sm" onclick="logout()" style="margin-top:6px; width:auto;">🚪 登出</button>
    </div>
    
    <!-- ===== 登入表單 ===== -->
    <div id="loginSection">
        <div id="loginAlert"></div>
        <div class="form-group">
            <label>登入 ID（學號）</label>
            <input type="text" id="loginUserId" placeholder="例如：VIP001" value="VIP001">
        </div>
        <div class="form-group">
            <label>密碼</label>
            <div class="password-wrapper">
                <input type="password" id="loginPassword" placeholder="請輸入密碼" value="NewPwd123">
                <button type="button" class="toggle-btn" id="toggleLoginPwd">👁️</button>
            </div>
        </div>
        <button class="btn btn-primary" id="loginBtn">🔒 登入</button>
        <div class="text-center mt-8">
            <button class="btn btn-outline btn-sm" id="forgotBtn" style="width:auto;">🔑 忘記密碼？</button>
        </div>
    </div>
    
    <!-- ===== 忘記密碼 ===== -->
    <div id="forgotSection" class="hidden">
        <h3 style="color:#2e0f5a;">🔑 忘記密碼</h3>
        <div class="text-sm" style="margin-bottom:12px;">輸入學號和電話號碼驗證</div>
        <div id="forgotAlert"></div>
        <div class="form-group">
            <label>登入 ID（學號）</label>
            <input type="text" id="forgotUserId" placeholder="例如：VIP001">
        </div>
        <div class="form-group">
            <label>電話號碼</label>
            <input type="text" id="forgotPhone" placeholder="例如：91234567">
        </div>
        <div class="flex">
            <button class="btn btn-outline" id="forgotCancelBtn">取消</button>
            <button class="btn btn-primary" id="forgotSubmitBtn">驗證並重設</button>
        </div>
    </div>
    
    <!-- ===== 修改密碼（登入後顯示） ===== -->
    <div id="changeSection" class="hidden">
        <div class="divider"></div>
        <h3 style="color:#2e0f5a;">🔐 修改密碼</h3>
        <div id="changeAlert"></div>
        <div class="form-group">
            <label>舊密碼</label>
            <div class="password-wrapper">
                <input type="password" id="changeOldPwd" placeholder="請輸入舊密碼">
                <button type="button" class="toggle-btn" id="toggleOldPwd">👁️</button>
            </div>
        </div>
        <div class="form-group">
            <label>新密碼（至少 6 個字元）</label>
            <div class="password-wrapper">
                <input type="password" id="changeNewPwd" placeholder="請輸入新密碼">
                <button type="button" class="toggle-btn" id="toggleNewPwd">👁️</button>
            </div>
        </div>
        <div class="form-group">
            <label>確認新密碼</label>
            <div class="password-wrapper">
                <input type="password" id="changeConfirmPwd" placeholder="請再次輸入新密碼">
                <button type="button" class="toggle-btn" id="toggleConfirmPwd">👁️</button>
            </div>
        </div>
        <button class="btn btn-success" id="changePwdBtn">✅ 確認修改</button>
    </div>
</div>

<!-- ===== Modal ===== -->
<div class="modal-overlay" id="modal">
    <div class="modal-box">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <div id="modalContent"></div>
    </div>
</div>

<script>
// ============================================================
// 🔥 Firebase 配置
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyBWUr-qFjDuAbRn2ueCOA24Bx5vHhGwCzs",
    authDomain: "mastering-science.firebaseapp.com",
    projectId: "mastering-science",
    storageBucket: "mastering-science.firebasestorage.app",
    messagingSenderId: "969510026630",
    appId: "1:969510026630:web:5c0ff3ffc7b3bdc04c8007"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

console.log('✅ Firebase 已初始化');

// ============================================================
// 🌐 全域變量
// ============================================================
let currentUser = null;

// ============================================================
// 🛠️ 工具函數
// ============================================================
function getUsers() {
    const raw = localStorage.getItem('ms_chem_users');
    if (raw) {
        try { return JSON.parse(raw); } catch(e) { return { users: [] }; }
    }
    return { users: [] };
}

function findUser(userId) {
    const db = getUsers();
    return db.users.find(u => u.userId === userId);
}

function updateUser(userId, data) {
    const db = getUsers();
    const index = db.users.findIndex(u => u.userId === userId);
    if (index !== -1) {
        db.users[index] = { ...db.users[index], ...data };
        localStorage.setItem('ms_chem_users', JSON.stringify(db));
        firebase.firestore().collection('users').doc(userId)
            .set(db.users[index], { merge: true })
            .catch(e => console.warn('⚠️ Firestore 更新失敗:', e.message));
        return db.users[index];
    }
    return null;
}

function generateRandomPassword() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
    let pwd = '';
    for (let i = 0; i < 8; i++) {
        pwd += chars[Math.floor(Math.random() * chars.length)];
    }
    return pwd;
}

function showAlert(id, type, msg) {
    const el = document.getElementById(id);
    if (!el) return;
    const types = { success: 'alert-success', danger: 'alert-danger', warning: 'alert-warning' };
    el.className = `alert ${types[type] || 'alert-info'}`;
    el.textContent = msg;
    el.style.display = 'block';
}

function clearAlert(id) {
    const el = document.getElementById(id);
    if (el) { el.style.display = 'none'; el.textContent = ''; }
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
}

function openModal(html) {
    document.getElementById('modalContent').innerHTML = html;
    document.getElementById('modal').classList.add('show');
}

function updateStatus(status, text) {
    const dot = document.getElementById('statusDot');
    const textEl = document.getElementById('statusText');
    const timeEl = document.getElementById('statusTime');
    dot.className = 'dot ' + status;
    textEl.textContent = text || '✅ 已連線';
    timeEl.textContent = new Date().toLocaleTimeString();
}

function updateUI() {
    const box = document.getElementById('userBox');
    if (currentUser) {
        box.classList.add('show');
        document.getElementById('displayName').textContent = currentUser.name || '未知';
        document.getElementById('displayId').textContent = currentUser.userId || currentUser.id;
        document.getElementById('displayClass').textContent = currentUser.className || '-';
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('changeSection').classList.remove('hidden');
        document.getElementById('forgotSection').classList.add('hidden');
        updateStatus('online', '✅ 已登入：' + (currentUser.name || currentUser.userId));
    } else {
        box.classList.remove('show');
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('changeSection').classList.add('hidden');
        document.getElementById('forgotSection').classList.add('hidden');
        updateStatus('connecting', '⏳ 等待登入');
    }
}

// ============================================================
// 🔐 登入
// ============================================================
document.getElementById('loginBtn').addEventListener('click', async function() {
    const userId = document.getElementById('loginUserId').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    clearAlert('loginAlert');
    
    if (!userId || !password) {
        showAlert('loginAlert', 'warning', '⚠️ 請輸入學號和密碼');
        return;
    }
    
    try {
        updateStatus('connecting', '⏳ 驗證中...');
        const email = userId + '@mastering-science.com';
        await auth.signInWithEmailAndPassword(email, password);
        console.log('✅ Auth 登入成功');
        
        // 讀取用戶資料
        let user = null;
        try {
            const doc = await firebase.firestore().collection('users').doc(userId).get();
            if (doc.exists) user = doc.data();
        } catch(e) {}
        if (!user) user = findUser(userId);
        if (!user) {
            showAlert('loginAlert', 'danger', '❌ 找不到用戶資料');
            await auth.signOut();
            updateStatus('offline', '❌ 用戶資料不存在');
            return;
        }
        
        currentUser = user;
        updateUI();
        showAlert('loginAlert', 'success', '✅ 登入成功！歡迎 ' + user.name);
        document.getElementById('loginPassword').value = '';
        
    } catch(e) {
        console.error('❌ 登入失敗:', e.code);
        const msg = e.code === 'auth/user-not-found' ? '❌ 帳戶不存在' :
                    e.code === 'auth/wrong-password' ? '❌ 密碼錯誤' :
                    e.code === 'auth/invalid-credential' ? '❌ 密碼錯誤' :
                    '❌ ' + e.message;
        showAlert('loginAlert', 'danger', msg);
        updateStatus('offline', '❌ 登入失敗');
    }
});

document.getElementById('loginPassword').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
});
document.getElementById('loginUserId').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

// ============================================================
// 🔑 修改密碼（✅ 核心測試重點）
// ============================================================
document.getElementById('changePwdBtn').addEventListener('click', async function() {
    const oldPwd = document.getElementById('changeOldPwd').value;
    const newPwd = document.getElementById('changeNewPwd').value;
    const confirmPwd = document.getElementById('changeConfirmPwd').value;
    clearAlert('changeAlert');
    
    if (newPwd.length < 6) {
        showAlert('changeAlert', 'warning', '⚠️ 密碼至少 6 個字元');
        return;
    }
    if (newPwd !== confirmPwd) {
        showAlert('changeAlert', 'warning', '❌ 兩次輸入的密碼不一致');
        return;
    }
    if (!currentUser) {
        showAlert('changeAlert', 'danger', '❌ 請先登入');
        return;
    }
    
    const userId = currentUser.userId || currentUser.id;
    const validOldPwd = currentUser.password || currentUser.initialPassword;
    if (oldPwd !== validOldPwd) {
        showAlert('changeAlert', 'warning', '❌ 舊密碼不正確');
        return;
    }
    
    try {
        // ✅ 1. 更新 localStorage
        updateUser(userId, { password: newPwd, isFirstLogin: false });
        currentUser = findUser(userId);
        
        // ✅ 2. 更新 Firebase Auth（核心測試！）
        const email = userId + '@mastering-science.com';
        const fbUser = auth.currentUser;
        
        if (fbUser) {
            await fbUser.updatePassword(newPwd);
            console.log('✅ Firebase Auth 已更新（直接更新）');
        } else {
            // Fallback：重新登入後更新
            console.warn('⚠️ 無已登入用戶，嘗試重新登入');
            const cred = await auth.signInWithEmailAndPassword(email, oldPwd);
            await cred.user.updatePassword(newPwd);
            console.log('✅ Firebase Auth 已更新（重新登入後更新）');
        }
        
        showAlert('changeAlert', 'success', '✅ 密碼已成功修改！請用新密碼登入測試');
        document.getElementById('changeOldPwd').value = '';
        document.getElementById('changeNewPwd').value = '';
        document.getElementById('changeConfirmPwd').value = '';
        
    } catch(e) {
        console.error('❌ 修改密碼失敗:', e);
        showAlert('changeAlert', 'danger', '❌ 修改失敗：' + e.message);
    }
});

// ============================================================
// 👁️ 密碼顯示切換
// ============================================================
function togglePwd(inputId, btn) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
    } else {
        input.type = 'password';
        btn.textContent = '👁️';
    }
}

document.getElementById('toggleLoginPwd').addEventListener('click', function() {
    togglePwd('loginPassword', this);
});
document.getElementById('toggleOldPwd').addEventListener('click', function() {
    togglePwd('changeOldPwd', this);
});
document.getElementById('toggleNewPwd').addEventListener('click', function() {
    togglePwd('changeNewPwd', this);
});
document.getElementById('toggleConfirmPwd').addEventListener('click', function() {
    togglePwd('changeConfirmPwd', this);
});

// ============================================================
// 🔑 忘記密碼（簡化版）
// ============================================================
document.getElementById('forgotBtn').addEventListener('click', function() {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('forgotSection').classList.remove('hidden');
    clearAlert('forgotAlert');
});

document.getElementById('forgotCancelBtn').addEventListener('click', function() {
    document.getElementById('forgotSection').classList.add('hidden');
    document.getElementById('loginSection').style.display = 'block';
});

document.getElementById('forgotSubmitBtn').addEventListener('click', function() {
    const userId = document.getElementById('forgotUserId').value.trim();
    const phone = document.getElementById('forgotPhone').value.trim();
    clearAlert('forgotAlert');
    
    if (!userId || !phone) {
        showAlert('forgotAlert', 'warning', '⚠️ 請輸入學號和電話號碼');
        return;
    }
    
    const user = findUser(userId);
    if (!user) {
        showAlert('forgotAlert', 'danger', '❌ 學號不存在');
        return;
    }
    if (user.phone !== phone) {
        showAlert('forgotAlert', 'danger', '❌ 電話號碼不正確');
        return;
    }
    
    const newPwd = generateRandomPassword();
    updateUser(userId, { initialPassword: newPwd, password: null, isFirstLogin: true });
    
    // 更新 Firebase Auth
    const email = userId + '@mastering-science.com';
    const oldPwd = user.password || user.initialPassword;
    auth.signInWithEmailAndPassword(email, oldPwd)
        .then(cred => cred.user.updatePassword(newPwd))
        .then(() => console.log('✅ Firebase Auth 已更新'))
        .catch(() => auth.createUserWithEmailAndPassword(email, newPwd).catch(e => console.warn(e)));
    
    openModal(`
        <div style="font-size:48px;">✅</div>
        <h2>密碼已重設</h2>
        <div style="color:#888; margin:4px 0;">👤 ${user.name}（${user.userId}）</div>
        <div style="font-size:13px; color:#666;">新密碼：</div>
        <div class="password-display">${newPwd}</div>
        <div style="font-size:12px; color:#f59e0b; margin:8px 0;">⚠️ 請用此密碼登入</div>
        <button class="btn btn-primary" onclick="closeModal()">我知道了</button>
    `);
    
    document.getElementById('forgotSection').classList.add('hidden');
    document.getElementById('loginSection').style.display = 'block';
});

// ============================================================
// 🚪 登出
// ============================================================
function logout() {
    if (confirm('確定要登出嗎？')) {
        auth.signOut();
        currentUser = null;
        updateUI();
        document.getElementById('loginPassword').value = '';
        updateStatus('connecting', '⏳ 已登出');
    }
}

// ============================================================
// 🔥 Auth 狀態監聽
// ============================================================
auth.onAuthStateChanged(function(user) {
    if (user && !currentUser) {
        const email = user.email;
        if (email && email.endsWith('@mastering-science.com')) {
            const userId = email.replace('@mastering-science.com', '');
            const found = findUser(userId);
            if (found) { currentUser = found; updateUI(); }
        }
    }
});

// ============================================================
// 🚀 初始化
// ============================================================
updateStatus('connecting', '⏳ 準備中...');
updateUI();
console.log('🚀 極簡密碼測試已啟動！用 VIP001 / NewPwd123 測試');
</script>

</body>
</html>
